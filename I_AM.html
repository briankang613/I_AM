<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Evolution of Design - 20단계의 기적</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --primary-color: #3b82f6;
      --bg-color: #ffffff;
      --card-bg: #ffffff;
      --text-color: #1f2937;
      --border-color: #000000;
      --border-radius: 0px;
      --box-shadow: 0px 0px 0px rgba(0,0,0,0);
      --card-gap: 16px;
      --blur-amount: 0px;
      --card-border-width: 3px;
    }

    /* 모든 레이아웃의 색상, 배경 변경에 극도로 부드러운 트랜지션 적용 */
    body, header, main, div, button, select, p, h1, h2, h3, h4, span {
      transition: background-color 0.8s cubic-bezier(0.25, 0.8, 0.25, 1), 
                  border-color 0.8s cubic-bezier(0.25, 0.8, 0.25, 1), 
                  color 0.5s ease-in-out;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      overflow-x: hidden;
    }

    /* 야간 모드(Dark Theme) 강제 클래스 */
    body.dark-mode-theme {
      --bg-color: #0b0f19;
      --text-color: #f1f5f9;
      --card-bg: #1e293b;
      --border-color: #475569;
    }

    /* 원시 상태 사각형에 필요한 기본 틀 */
    .raw-box {
      border: var(--card-border-width) solid var(--border-color);
      background-color: var(--card-bg);
      border-radius: var(--border-radius);
      box-shadow: var(--box-shadow);
      padding: 24px;
      /* 그림자 실시간 반응성을 확보하기 위해 box-shadow는 transition 대상에서 전격 배제 */
      transition: background-color 0.5s, 
                  border-color 0.5s, 
                  transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* 페인트 폭발용 은은한 오버레이 효과 */
    #paint-ripple {
      position: fixed;
      border-radius: 50%;
      transform: scale(0);
      pointer-events: none;
      z-index: 30;
      transition: transform 1.2s cubic-bezier(0.1, 0.8, 0.3, 1);
    }

    /* 2단계 자석 기하학 오브젝트 */
    #magnet-object {
      transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), top 0.6s cubic-bezier(0.25, 1, 0.5, 1);
    }
    @keyframes magnet-shaking {
      0%, 100% { transform: translateX(-50%) rotate(0deg); }
      15% { transform: translateX(-50%) rotate(-7deg); }
      30% { transform: translateX(-50%) rotate(6deg); }
      45% { transform: translateX(-50%) rotate(-5deg); }
      60% { transform: translateX(-50%) rotate(4deg); }
      75% { transform: translateX(-50%) rotate(-2deg); }
    }
    .magnet-vibrate {
      animation: magnet-shaking 0.4s ease-in-out infinite;
    }

    .grid-container {
      display: grid;
      gap: var(--card-gap);
      transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    /* 안경 블러 연동용 클래스 */
    .blur-inactive {
      filter: blur(var(--blur-amount));
      opacity: 0.5;
      transition: filter 0.4s ease, opacity 0.4s ease;
    }
    .blur-active {
      filter: blur(0px) !important;
      opacity: 1 !important;
      transform: scale(1.04);
      z-index: 10;
    }

    /* 20단계 빗자루: 완전한 플랫/미니멀 최종 상태 */
    .minimal-flat {
      background: var(--card-bg) !important;
      border: 1px solid rgba(226, 232, 240, 0.25) !important;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.025) !important;
      border-radius: 12px !important;
      transition: all 0.3s ease !important;
    }
    .minimal-flat:hover {
      transform: translateY(-4px) !important;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1) !important;
    }

    /* 숨김 및 서서히 노출 처리 */
    .hidden-initially {
      opacity: 0;
      pointer-events: none;
      transform: translateY(20px);
      transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .visible-step {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    /* 툴팁 말풍선 기하학 정의 */
    .tooltip-balloon {
      position: absolute;
      bottom: 110%;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background-color: #1e293b;
      color: #ffffff;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      z-index: 50;
    }
    .tooltip-balloon::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border-width: 6px;
      border-style: solid;
      border-color: #1e293b transparent transparent transparent;
    }
    .tooltip-active .tooltip-balloon {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* 20단계 빗자루 시네마틱 영역 */
    #broom-cinematic-container {
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
      overflow: hidden;
      display: none;
    }
    @keyframes broom-sweep-across {
      0% { transform: translate(-100vw, 15vh) rotate(-45deg); }
      35% { transform: translate(-20vw, -10vh) rotate(15deg); }
      65% { transform: translate(30vw, -15vh) rotate(-15deg); }
      100% { transform: translate(120vw, 15vh) rotate(45deg); }
    }
    .broom-animating {
      animation: broom-sweep-across 1.8s cubic-bezier(0.645, 0.045, 0.355, 1) forwards;
    }
    .cinematic-blur-effect {
      filter: blur(15px);
      transition: filter 0.8s ease-in-out;
    }

    /* 0단계 -> 1단계 빨려들어가는 페인트통 효과 전용 스타일 */
    .paint-bucket-sliding {
      position: fixed;
      bottom: -150px;
      left: -150px;
      z-index: 50;
      cursor: pointer;
      transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
    }
    .paint-bucket-sliding.active {
      bottom: 40px;
      left: 40px;
    }
    @keyframes suck-into-box {
      0% {
        transform: translate(0, 0) scale(1) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translate(var(--suck-x), var(--suck-y)) scale(0) rotate(720deg);
        opacity: 0;
      }
    }
    .paint-bucket-sliding.sucking {
      animation: suck-into-box 0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards;
      pointer-events: none;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-4 md:p-8 relative selection:bg-blue-200">

  <!-- 페인트 버스트용 고정 노드 -->
  <div id="paint-ripple"></div>

  <!-- 2단계: 새로 디자인된 명확한 U자형 클래식 말굽자석 -->
  <div id="magnet-object" class="fixed left-1/2 -translate-x-1/2 top-[-250px] w-48 h-48 z-40 pointer-events-none filter drop-shadow-2xl">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
      <!-- 말굽모양 실루엣 커브 (N극 빨강, S극 파랑 전도체) -->
      <!-- 왼쪽 N극 기둥 -->
      <path d="M20 50 C20 25, 30 15, 50 15 C70 15, 80 25, 80 50 L80 55 C80 55, 60 55, 60 55 L60 50 C60 38, 55 35, 50 35 C45 35, 40 38, 40 50 L40 55 L20 55 Z" fill="#ef4444" />
      <!-- 오른쪽 절반 S극 오버레이 -->
      <path d="M50 15 C70 15, 80 25, 80 50 L80 55 L60 55 L60 50 C60 38, 55 35, 50 35 Z" fill="#3b82f6" />
      
      <!-- N/S 철제 터미널 엔드 캡 -->
      <rect x="20" y="55" width="20" height="8" fill="#e2e8f0" rx="1" />
      <rect x="60" y="55" width="20" height="8" fill="#e2e8f0" rx="1" />
      
      <!-- 자기장 전도 기호 텍스트 -->
      <text x="27" y="51" fill="#ffffff" font-size="9" font-weight="900" font-family="monospace">N</text>
      <text x="67" y="51" fill="#ffffff" font-size="9" font-weight="900" font-family="monospace">S</text>
      
      <!-- 자기장 스파크 에너지선 -->
      <path d="M30 70 L30 85 M70 70 L70 85 M50 68 L50 90" stroke="#fcd34d" stroke-width="3" stroke-linecap="round" opacity="0" id="magnet-field-lines" />
    </svg>
  </div>

  <!-- 빗자루 싹쓸이 연출 노드 -->
  <div id="broom-cinematic-container">
    <div id="sweeper-object" class="absolute left-0 top-1/4 w-96 h-96 opacity-90 drop-shadow-[0_20px_50px_rgba(0,0,0,0.35)]">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
        <rect x="75" y="5" width="6" height="50" rx="3" transform="rotate(35 75 5)" fill="#b45309" />
        <ellipse cx="48" cy="46" rx="9" ry="5" transform="rotate(35 48 46)" fill="#d97706" />
        <path d="M44 48 L20 85 C15 92, 45 98, 55 92 L53 50 Z" fill="#fcd34d" />
        <path d="M42 52 L26 84" stroke="#d97706" stroke-width="1.5" />
        <path d="M45 52 L35 88" stroke="#d97706" stroke-width="1.5" />
        <circle cx="18" cy="90" r="3" fill="#60a5fa" opacity="0.9" />
        <circle cx="58" cy="85" r="2.5" fill="#10b981" opacity="0.8" />
      </svg>
    </div>
  </div>

  <!-- 토스트 알림창 컨테이너 -->
  <div id="toast-container" class="fixed top-6 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <!-- 15단계 커튼: 모달 사이드 슬라이더 -->
  <div id="curtain-overlay" class="fixed inset-y-0 right-0 w-full md:w-96 bg-white dark:bg-slate-800 border-l-4 border-black dark:border-slate-600 z-40 transform translate-x-full transition-transform duration-500 ease-in-out shadow-2xl flex flex-col justify-between p-6">
    <div>
      <div class="flex justify-between items-center border-b-2 border-black dark:border-slate-600 pb-4 mb-4">
        <h3 id="curtain-title" class="text-xl font-black">레이어 상세</h3>
        <button id="curtain-close" class="text-gray-500 hover:text-black dark:hover:text-white font-bold text-3xl p-1">&times;</button>
      </div>
      <div id="curtain-body" class="text-sm text-gray-700 dark:text-gray-300 leading-relaxed">
        내부 상세 구조 정보 레이어입니다.
      </div>
    </div>
    <div class="bg-gray-100 dark:bg-slate-950 p-4 font-mono text-xs text-gray-500 rounded-md">
      <p>Step 15: Curtain Layer [Active]</p>
    </div>
  </div>

  <!-- 헤더 영역 -->
  <header class="w-full max-w-5xl mx-auto z-10 flex justify-between items-center py-4 border-b-2 border-black dark:border-slate-700 transition-all duration-700" id="main-header">
    <div>
      <h1 class="text-xl md:text-2xl font-black tracking-wider uppercase" id="site-logo">Raw Canvas</h1>
      <p class="text-xs text-gray-500 mt-1" id="site-subtitle">가장 날것의 상자에서 시작하는 디자인 여행</p>
    </div>
    <div class="flex items-center gap-4 text-right">
      <button id="reset-btn" class="hidden px-2.5 py-1 text-[10px] font-mono font-bold uppercase border border-red-500 text-red-500 hover:bg-red-500 hover:text-white active:scale-95 transition-all rounded-md">
        Reset
      </button>
      <div>
        <span class="text-xs font-mono bg-black text-white px-2 py-1 uppercase tracking-widest rounded-none transition-all duration-700" id="badge-step">
          Step 0 / 20
        </span>
        <div class="text-xs text-gray-400 mt-1 font-mono" id="progress-percent">0% Evolution</div>
      </div>
    </div>
  </header>

  <!-- 0단계 전용: 화면 밖에서 나타나는 슬라이딩 페인트통 도구 -->
  <div id="paint-bucket-tool" class="paint-bucket-sliding bg-blue-600 text-white p-4 rounded-full shadow-2xl flex items-center justify-center border-2 border-white hover:scale-110 active:scale-95 transition-transform" onclick="triggerSuckInAnimation()">
    <i data-lucide="paint-bucket" class="w-10 h-10 animate-bounce"></i>
  </div>

  <!-- 메인 워크 랩 -->
  <main id="main-content-wrap" class="flex-grow w-full max-w-5xl mx-auto flex flex-col justify-center items-center py-8 md:py-16 z-10">
    
    <!-- 진화 가이드 피드백 텍스트 -->
    <div id="guide-message" class="text-center mb-8 max-w-xl transition-all duration-500">
      <p class="text-lg font-bold text-gray-800 dark:text-white" id="guide-title">완전히 비어 있는 원시 상태입니다.</p>
      <p class="text-sm text-gray-500 mt-2" id="guide-desc">무언가 일어날 때까지 잠시 기다리거나 상자를 지켜보세요...</p>
    </div>

    <!-- 카드 뷰포트 영역 상단 우측 야간모드 스위치 위치 -->
    <div class="w-full flex justify-end pr-2 mb-4">
      <button id="night-toggle-btn" class="hidden flex items-center gap-1 px-3 py-1.5 rounded-full border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-amber-500 dark:text-sky-400 hover:scale-105 active:scale-95 transition-all text-xs font-bold shadow-sm">
        <span id="night-toggle-label" class="mr-1">라이트 모드</span>
        <i data-lucide="sun" id="sun-toggle-icon" class="w-4 h-4"></i>
        <i data-lucide="moon" id="moon-toggle-icon" class="w-4 h-4 hidden"></i>
      </button>
    </div>

    <!-- 핵심 디자인 변화 캔버스 컨테이너 -->
    <div id="canvas-container" class="w-full flex justify-center items-center min-h-[300px]">
      
      <!-- [0단계] 최초 시작 시 보이는 상자 -->
      <div id="initial-start-box" class="raw-box w-64 h-64 flex flex-col justify-center items-center relative">
        <span class="text-sm font-black text-gray-800 dark:text-gray-100 uppercase tracking-widest text-center" id="empty-box-text">EMPTY BOX</span>
        <span class="text-[10px] text-gray-400 mt-2 font-mono" id="empty-box-sub">Ready for Color</span>
      </div>

    </div>

    <!-- 진화 단계 타임라인 시각 기구 -->
    <div id="timeline-container" class="w-full mt-12 hidden-initially">
      <div class="flex justify-between text-xs font-mono text-gray-400 mb-2">
        <span class="flex items-center gap-1">
          Evolution Steps 
          <span id="timeline-unlock-tag" class="hidden text-green-600 bg-green-100 dark:bg-green-950 px-1.5 py-0.5 rounded text-[10px] font-bold animate-pulse">🔓 자유 순간이동 해금됨</span>
        </span>
        <span id="timeline-count">0 / 20</span>
      </div>
      <div class="w-full bg-gray-200 dark:bg-slate-800 h-2 rounded-full overflow-hidden">
        <div id="timeline-bar" class="bg-blue-600 h-full w-0 transition-all duration-500"></div>
      </div>
      <div class="grid grid-cols-5 md:grid-cols-20 gap-1 mt-2 text-[9px] text-center font-mono text-gray-400" id="timeline-steps-labels">
        <!-- JS 동적 주입 -->
      </div>
    </div>

  </main>

  <!-- 안내 안내 상세 모달 -->
  <div id="info-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 opacity-0 pointer-events-none transition-opacity duration-300">
    <div id="info-modal-content" class="bg-white dark:bg-slate-800 border-2 border-black dark:border-slate-700 w-full max-w-md p-6 shadow-2xl transform scale-95 transition-transform duration-300 rounded-none relative">
      <button id="modal-close" class="absolute top-4 right-4 text-gray-400 hover:text-black dark:hover:text-white font-bold text-2xl">&times;</button>
      <h3 id="modal-title" class="text-lg font-black mb-3 text-gray-900 dark:text-white">제목</h3>
      <p id="modal-desc" class="text-sm text-gray-600 dark:text-gray-300 leading-relaxed mb-6">설명문</p>
      <div class="flex justify-between items-center pt-4 border-t border-gray-100 dark:border-slate-700">
        <span id="modal-meta" class="text-[10px] font-mono text-gray-400">Step 정보</span>
        <button id="modal-confirm" class="px-4 py-1.5 bg-black dark:bg-slate-700 text-white font-bold text-xs uppercase tracking-wider rounded hover:bg-gray-800 dark:hover:bg-slate-600 transition-colors">확인</button>
      </div>
    </div>
  </div>

  <script>
    // --- STATE MANAGEMENT ---
    let currentStep = 0;
    const maxSteps = 20;
    
    let colorPalette = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#14b8a6', '#6366f1'];
    let selectedColor = '#3b82f6';
    
    let step2Aligned = false; 
    let timelineUnlocked = false; 
    let isDarkMode = false;
    
    // 3단계 줄자 슬라이더 조절값
    let rulerGapVal = 16;

    // 5단계 사포 카드별 둥글기 상태값 누적 저장소
    let cardRadii = { 1: 0, 2: 0, 3: 0, 4: 0 };

    // 10단계 붓 타이포그래피 스타일값
    let selectedFontFamily = 'font-sans';
    let selectedFontWeight = 'font-normal';
    let selectedFontSize = 'text-xs';

    // 12단계 활성(Active) 상태 변수
    let activeCardId = null;

    // 16단계 모래시계 시뮬레이터 플래그
    let isLoadingMode = false;

    // 19단계 고무줄 반응형 시뮬레이터 넓이값
    let simulatorWidthClass = 'max-w-2xl';

    // 20단계 원형 콘트롤 팝업 활성화 정보
    let activePopMenu = null; 

    // DOM 참조 변수
    let canvasContainer, paintBucketTool, paintRipple;
    let guideTitle, guideDesc, badgeStep, progressPercent, siteLogo, mainHeader;
    let timelineContainer, timelineBar, timelineCount, timelineStepsLabels, resetBtn, timelineUnlockTag;
    let infoModal, infoModalContent, modalTitle, modalDesc, modalMeta, modalClose, modalConfirm;
    let toastContainer, curtainOverlay, curtainTitle, curtainBody, curtainClose;
    let nightToggleBtn, nightToggleLabel, sunToggleIcon, moonToggleIcon;

    // 20개 진화 단계 데이터베이스 정의
    const stepsData = [
      { id: 1, title: "배경색 & 테마", toolName: "페인트통", icon: "paint-bucket", desc: "웹에 영혼을 가미합니다. 상자를 마우스로 '꾹' 누르고 있으면 배경 테마를 감각적인 수면 위로 차올립니다.", actionDesc: "1번 카드를 마우스로 꾹 눌러 게이지를 100% 충전하고 우주의 배경색을 변화시키세요!" },

    // --- LIFE CYCLE BOOTSTRAP ---
    window.addEventListener('DOMContentLoaded', () => {
      canvasContainer = document.getElementById('canvas-container');
      paintBucketTool = document.getElementById('paint-bucket-tool');
      paintRipple = document.getElementById('paint-ripple');
      guideTitle = document.getElementById('guide-title');

      badgeStep = document.getElementById('badge-step');
      progressPercent = document.getElementById('progress-percent');
      siteLogo = document.getElementById('site-logo');
      mainHeader = document.getElementById('main-header');
      timelineContainer = document.getElementById('timeline-container');
      timelineBar = document.getElementById('timeline-bar');
      timelineCount = document.getElementById('timeline-count');
      timelineStepsLabels = document.getElementById('timeline-steps-labels');
      resetBtn = document.getElementById('reset-btn');
      timelineUnlockTag = document.getElementById('timeline-unlock-tag');

      infoModal = document.getElementById('info-modal');
      infoModalContent = document.getElementById('info-modal-content');
      modalTitle = document.getElementById('modal-title');
      modalDesc = document.getElementById('modal-desc');
      modalMeta = document.getElementById('modal-meta');
      modalClose = document.getElementById('modal-close');
      modalConfirm = document.getElementById('modal-confirm');
      toastContainer = document.getElementById('toast-container');
      curtainOverlay = document.getElementById('curtain-overlay');
      curtainTitle = document.getElementById('curtain-title');
      curtainBody = document.getElementById('curtain-body');
      curtainClose = document.getElementById('curtain-close');

      nightToggleBtn = document.getElementById('night-toggle-btn');
      nightToggleLabel = document.getElementById('night-toggle-label');
      sunToggleIcon = document.getElementById('sun-toggle-icon');
      moonToggleIcon = document.getElementById('moon-toggle-icon');

      // 야간 테마 스위치 이벤트 리스너
      if (nightToggleBtn) {
        nightToggleBtn.addEventListener('click', toggleThemeMode);
      }

      // 모달 수용 제어 연계
      if (modalClose) modalClose.addEventListener('click', closeModal);
      if (modalConfirm) modalConfirm.addEventListener('click', closeModal);
      if (infoModal) {
        infoModal.addEventListener('click', (e) => {
          if (e.target === infoModal) closeModal();
        });
      }
      if (curtainClose) {
        curtainClose.addEventListener('click', () => {
          if (curtainOverlay) curtainOverlay.classList.add('translate-x-full');
        });
      }

      if (resetBtn) {
        resetBtn.addEventListener('click', triggerFullReset);
      }

      // 0단계 시작 후 500ms 뒤 페인트통 슬라이딩 등장 연출 기동
      setTimeout(() => {
        if (paintBucketTool && currentStep === 0) {
          paintBucketTool.classList.add('active');
        }

      renderTimelineLabels();
      lucide.createIcons();

    // 0단계 -> 1단계 빨려 들어가는 애니메이션 처리
    function triggerSuckInAnimation() {
      const tool = document.getElementById('paint-bucket-tool');
      const targetBox = document.getElementById('initial-start-box');

      if (!tool || !targetBox) return;

      const toolRect = tool.getBoundingClientRect();
      const boxRect = targetBox.getBoundingClientRect();

      // 타겟 상자 중앙과 페인트통의 거리 측정
      const destX = (boxRect.left + boxRect.width / 2) - (toolRect.left + toolRect.width / 2);
      const destY = (boxRect.top + boxRect.height / 2) - (toolRect.top + toolRect.height / 2);

      tool.style.setProperty('--suck-x', `${destX}px`);
      tool.style.setProperty('--suck-y', `${destY}px`);

      // 흡입 애니메이션 클래스 바인딩
      tool.classList.add('sucking');

      // 사각형 내부 빨려 들어갈 때의 흔들림 시각 효과 가미
      setTimeout(() => {
        targetBox.style.transform = "scale(0.92) rotate(-3deg)";
        targetBox.style.borderColor = "#2563eb";
      }, 400);

      setTimeout(() => {
        // 원래 크기로 튕기며 1단계로 진입
        targetBox.style.transform = "scale(1.05) rotate(0deg)";
        setTimeout(() => {
          targetBox.style.transform = "";
          targetBox.style.borderColor = "";
          
          currentStep = 1;
          updateEvolution();
        }, 150);
      }, 800);
    }

    // 야간 테마 전환 비즈니스 로직
    function toggleThemeMode() {
      isDarkMode = !isDarkMode;
      applyDarkModeState();
    }

    function applyDarkModeState() {
      if (isDarkMode) {
        document.body.classList.add('dark-mode-theme');
        if (sunToggleIcon) sunToggleIcon.classList.add('hidden');
        if (moonToggleIcon) moonToggleIcon.classList.remove('hidden');
        if (nightToggleLabel) nightToggleLabel.textContent = "다크 모드";
      } else {
        document.body.classList.remove('dark-mode-theme');
        if (sunToggleIcon) sunToggleIcon.classList.remove('hidden');
        if (moonToggleIcon) moonToggleIcon.classList.add('hidden');
        if (nightToggleLabel) nightToggleLabel.textContent = "라이트 모드";
      }
    }

    // 타임라인 레이블 인덱스 렌더링
    function renderTimelineLabels() {
      if (!timelineStepsLabels) return;
      let html = "";
      for (let i = 1; i <= maxSteps; i++) {
        const isCurrent = i === currentStep;
        const isPassed = i <= currentStep;
        let colorClass = "text-gray-400 dark:text-gray-600";
        if (isCurrent) {
          colorClass = "text-blue-600 dark:text-blue-400 font-black scale-110";
        } else if (isPassed) {
          colorClass = "text-slate-800 dark:text-slate-200 font-bold";
        }
        
        let cursorClass = timelineUnlocked ? "cursor-pointer hover:text-blue-500 hover:scale-110 transition-transform" : "cursor-default";
        let clickHandler = timelineUnlocked ? `onclick="handleTimelineJump(${i})"` : "";
        
        html += `
          <div class="${colorClass} ${cursorClass} flex flex-col items-center justify-center p-0.5" ${clickHandler} title="${stepsData[i-1]?.title || ''}">
            <span class="text-[9px] md:text-xs">${i}</span>
          </div>
        `;
      }
      timelineStepsLabels.innerHTML = html;
    }

    // 타임라인 강제 이동 점프
    function handleTimelineJump(stepNum) {
      if (!timelineUnlocked) return;
      
      if (stepNum === 20) {
        triggerBroomCinematic(() => {
          currentStep = 20;
          step2Aligned = true;
          updateEvolution();
        });
      } else {
        currentStep = stepNum;
        if (currentStep >= 2) {
          step2Aligned = true; 
        } else {
          step2Aligned = false;
        }
        updateEvolution();
      }
    }

    // 빗자루 클린 시네마틱 효과
    function triggerBroomCinematic(onCompleteCallback) {
      const broomContainer = document.getElementById('broom-cinematic-container');
      const broomObject = document.getElementById('sweeper-object');
      const mainWrap = document.getElementById('main-content-wrap');

      if (!broomContainer || !broomObject || !mainWrap) return;

      broomContainer.style.display = 'block';
      broomObject.classList.remove('broom-animating');
      mainWrap.classList.add('cinematic-blur-effect');

      void broomObject.offsetWidth; // Force reflow

      broomObject.classList.add('broom-animating');

      setTimeout(() => {
        if (onCompleteCallback) onCompleteCallback();
      }, 900);

      setTimeout(() => {
        mainWrap.classList.remove('cinematic-blur-effect');
        broomContainer.style.display = 'none';
        broomObject.classList.remove('broom-animating');
      }, 1800);
    }

    // 전체 진화 진폭 상태 동기화 관리
    function updateEvolution() {
      // 0단계가 아니면 페인트통 슬라이딩 도구 제거
      if (currentStep > 0 && paintBucketTool) {
        paintBucketTool.classList.remove('active');
        setTimeout(() => {
          paintBucketTool.style.display = 'none';
        }, 500);
      }

      // 20단계 완주 시 자유 순간이동 기밀 해금
      if (currentStep === 20 && timelineUnlockTag) {
        timelineUnlocked = true;
        timelineUnlockTag.classList.remove('hidden');
      }

      if (badgeStep) badgeStep.textContent = `Step ${currentStep} / ${maxSteps}`;
      if (progressPercent) progressPercent.textContent = `${currentStep * 5}% Evolution`;
      if (timelineCount) timelineCount.textContent = `${currentStep} / ${maxSteps}`;
      if (timelineBar) timelineBar.style.width = `${currentStep * 5}%`;

      // 7단계부터 19단계까지 야간 테마 단추 노출 보장 (야간 모드 색 전환은 부드럽게 이뤄지도록 CSS 이징 적용)
      if (currentStep >= 7) {
        if (nightToggleBtn) nightToggleBtn.classList.remove('hidden');
      } else {
        if (nightToggleBtn) nightToggleBtn.classList.add('hidden');
      }

      // 사포 다음 진화 완료 시, 네 카드 보더 곡률 영구화 처리
      if (currentStep >= 6) {
        cardRadii = { 1: 12, 2: 12, 3: 12, 4: 12 };
      }

      renderTimelineLabels();

      if (currentStep > 0 && currentStep <= maxSteps && guideTitle && guideDesc) {
        const currentData = stepsData[currentStep - 1];
        guideTitle.textContent = `${currentStep}단계: ${currentData.title} 활성화!`;
        guideDesc.textContent = currentData.actionDesc;
        guideTitle.classList.remove('text-blue-600');
        guideTitle.classList.add('text-gray-800', 'dark:text-white');
      }

      if (currentStep > 0 && resetBtn && timelineContainer) {
        resetBtn.classList.remove('hidden');
        timelineContainer.classList.add('visible-step');
        timelineContainer.classList.remove('hidden-initially');
      }

      if (currentStep >= 1 && siteLogo && mainHeader) {
        siteLogo.textContent = "Creative Sandbox";
        siteLogo.className = "text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-sky-400 dark:to-indigo-400";
        mainHeader.classList.remove('border-black');
        mainHeader.classList.add('border-slate-200', 'dark:border-slate-700');
      }

      renderCanvas();
    }

    // 1단계 배경테마를 꾹 누르고 있을 때의 충전 인터랙션 초기화 전용 함수
    function bindStep1HoldEvent() {
      const box1 = document.getElementById('box-1');
      const holdFiller = document.getElementById('hold-filler');
      const stageSuccessMark = document.getElementById('stage-success-mark');
      const stageInnerWrapper = document.getElementById('stage-inner-wrapper');
      
      if (!box1 || !holdFiller) return;

      let holdTimer = null;
      let progress = 0;

      const startHolding = (e) => {
        e.preventDefault();
        if (holdTimer) clearInterval(holdTimer);
        
        holdTimer = setInterval(() => {
          if (progress < 100) {
            progress += 3; // 충전 속도 상향
            holdFiller.style.transform = `scaleY(${progress / 100})`;
          } else {
            clearInterval(holdTimer);
            holdTimer = null;
            
            // 100% 도달 연출 개시
            stageInnerWrapper.classList.add('opacity-0');
            stageSuccessMark.classList.remove('hidden');
            setTimeout(() => {
              stageSuccessMark.classList.remove('scale-0');
              stageSuccessMark.classList.add('scale-100');
            }, 50);

            // 페인트 버스트 웨이브 확장
            paintRipple.style.left = `50%`;
            paintRipple.style.top = `50%`;
            paintRipple.style.backgroundColor = isDarkMode ? '#1e1b4b' : '#eff6ff';
            paintRipple.style.transform = 'scale(150)';

            setTimeout(() => {
              if (!isDarkMode) {
                document.body.style.backgroundColor = '#f1f5f9';
              }
              paintRipple.style.transform = 'scale(0)';
              advanceStep(1); // 다음 단계인 2단계 자석으로 자동 진출을 준비
            }, 800);
          }
        }, 20);
      };

      const stopHolding = () => {
        if (holdTimer) {
          clearInterval(holdTimer);
          holdTimer = null;
        }
        let drain = setInterval(() => {
          if (progress > 0) {
            progress -= 6;
            if (progress < 0) progress = 0;
            holdFiller.style.transform = `scaleY(${progress / 100})`;

                <span class="flex items-center gap-1.5 text-purple-600 dark:text-purple-400"><i data-lucide="brush" class="w-4 h-4"></i> 타이포그래피 정렬</span>
                ${popupCloseButton}
              </div>
              <div class="grid grid-cols-3 gap-1.5 text-[11px]">
                <select id="font-family-select" class="bg-slate-50 dark:bg-slate-750 border border-slate-200 dark:border-slate-650 p-1.5 rounded text-slate-700 dark:text-gray-100" onchange="changeFontConfig('family', this.value)">
                  <option value="font-sans" ${selectedFontFamily === 'font-sans' ? 'selected' : ''}>Sans</option>
                  <option value="font-serif" ${selectedFontFamily === 'font-serif' ? 'selected' : ''}>Serif</option>
                  <option value="font-mono" ${selectedFontFamily === 'font-mono' ? 'selected' : ''}>Mono</option>
                </select>
                <select id="font-weight-select" class="bg-slate-50 dark:bg-slate-750 border border-slate-200 dark:border-slate-650 p-1.5 rounded text-slate-700 dark:text-gray-100" onchange="changeFontConfig('weight', this.value)">
                  <option value="font-normal" ${selectedFontWeight === 'font-normal' ? 'selected' : ''}>Normal</option>
                  <option value="font-semibold" ${selectedFontWeight === 'font-semibold' ? 'selected' : ''}>SemiBold</option>
                  <option value="font-black" ${selectedFontWeight === 'font-black' ? 'selected' : ''}>Black</option>
                </select>
                <select id="font-size-select" class="bg-slate-50 dark:bg-slate-750 border border-slate-200 dark:border-slate-650 p-1.5 rounded text-slate-700 dark:text-gray-100" onchange="changeFontConfig('size', this.value)">
                  <option value="text-xs" ${selectedFontSize === 'text-xs' ? 'selected' : ''}>Small</option>
                  <option value="text-sm" ${selectedFontSize === 'text-sm' ? 'selected' : ''}>Medium</option>
                  <option value="text-base" ${selectedFontSize === 'text-base' ? 'selected' : ''}>Large</option>
                </select>
              </div>
            </div>
          `;
        } else if (activePopMenu === 'palette') {
          activeMenuContent = `
            <div class="p-5 bg-white dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 shadow-2xl rounded-2xl animate-fade-in flex flex-col gap-3 max-w-sm w-full font-sans">
              <div class="flex items-center justify-between text-xs font-bold text-slate-700 dark:text-gray-300">
                <span class="flex items-center gap-1.5 text-emerald-600 dark:text-emerald-400"><i data-lucide="palette" class="w-4 h-4"></i> 액센트 브랜드 색상</span>
                ${popupCloseButton}
              </div>
              <div class="flex gap-2 justify-center py-1">
                ${colorPalette.map(color => `
                  <button class="w-6 h-6 rounded-full border-2 transition-all hover:scale-125" 
                          style="background-color: ${color}; border-color: ${selectedColor === color ? '#000' : 'transparent'};"
                          onclick="changePointColor('${color}')">
                  </button>
                `).join('')}
              </div>
            </div>
          `;
        } else if (activePopMenu === 'rubber') {
          activeMenuContent = `
            <div class="p-5 bg-white dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 shadow-2xl rounded-2xl animate-fade-in flex flex-col gap-3 max-w-sm w-full font-sans">
              <div class="flex items-center justify-between text-xs font-bold text-slate-700 dark:text-gray-300">
                <span class="flex items-center gap-1.5 text-teal-600 dark:text-teal-400"><i data-lucide="shrink" class="w-4 h-4"></i> 고무줄 탄력 뷰포트 변경</span>
                ${popupCloseButton}
              </div>
              <div class="flex flex-col gap-1 text-[11px]">
                <button onclick="changeSimWidth('max-w-md')" class="py-1.5 px-3 border border-slate-200 dark:border-slate-700 rounded font-semibold ${simulatorWidthClass === 'max-w-md' ? 'bg-slate-900 dark:bg-slate-600 text-white' : 'bg-white dark:bg-slate-700 text-slate-700 dark:text-gray-200'} transition-all mb-1">스마트폰 폭 (Mobile)</button>
                <button onclick="changeSimWidth('max-w-2xl')" class="py-1.5 px-3 border border-slate-200 dark:border-slate-700 rounded font-semibold ${simulatorWidthClass === 'max-w-2xl' ? 'bg-slate-900 dark:bg-slate-600 text-white' : 'bg-white dark:bg-slate-700 text-slate-700 dark:text-gray-200'} transition-all mb-1">태블릿 폭 (Tablet)</button>
                <button onclick="changeSimWidth('max-w-5xl')" class="py-1.5 px-3 border border-slate-200 dark:border-slate-700 rounded font-semibold ${simulatorWidthClass === 'max-w-5xl' ? 'bg-slate-900 dark:bg-slate-600 text-white' : 'bg-white dark:bg-slate-700 text-slate-700 dark:text-gray-200'} transition-all">데스크톱 폭 (Desktop)</button>
              </div>
            </div>
          `;
        }

        // 야간모드 토글을 5번째 휠 다이얼 버튼으로 완벽 정합 배치
        minimalistControlCenter = `
          <div id="min-control-center" class="w-full max-w-2xl mb-8 flex flex-col items-center gap-4 z-20 animate-fade-in">
            <div class="flex items-center gap-3 bg-white dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-750 p-2.5 rounded-full shadow-2xl">
              <button onclick="togglePopMenu('ruler')" class="w-12 h-12 rounded-full flex items-center justify-center transition-all ${activePopMenu === 'ruler' ? 'bg-amber-100 dark:bg-amber-950 text-amber-700 dark:text-amber-400 scale-110 shadow-md' : 'bg-slate-50 dark:bg-slate-750 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700'}" title="간격(줄자)">
                <i data-lucide="ruler" class="w-5 h-5"></i>
              </button>
              <button onclick="togglePopMenu('typo')" class="w-12 h-12 rounded-full flex items-center justify-center transition-all ${activePopMenu === 'typo' ? 'bg-purple-100 dark:bg-purple-950 text-purple-700 dark:text-purple-400 scale-110 shadow-md' : 'bg-slate-50 dark:bg-slate-750 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700'}" title="타이포(붓)">
                <i data-lucide="brush" class="w-5 h-5"></i>
              </button>
              <button onclick="togglePopMenu('palette')" class="w-12 h-12 rounded-full flex items-center justify-center transition-all ${activePopMenu === 'palette' ? 'bg-emerald-100 dark:bg-emerald-950 text-emerald-700 dark:text-emerald-400 scale-110 shadow-md' : 'bg-slate-50 dark:bg-slate-750 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700'}" title="강조색(팔레트)">
                <i data-lucide="palette" class="w-5 h-5"></i>
              </button>
              <button onclick="togglePopMenu('rubber')" class="w-12 h-12 rounded-full flex items-center justify-center transition-all ${activePopMenu === 'rubber' ? 'bg-teal-100 dark:bg-teal-950 text-teal-700 dark:text-teal-400 scale-110 shadow-md' : 'bg-slate-50 dark:bg-slate-750 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700'}" title="뷰포트(고무줄)">
                <i data-lucide="shrink" class="w-5 h-5"></i>
              </button>
              <!-- 5번째 야간 모드 연동 휠 조작기 -->
              <button onclick="toggleThemeMode()" class="w-12 h-12 rounded-full flex items-center justify-center bg-slate-100 dark:bg-slate-700 text-amber-500 dark:text-sky-400 hover:scale-110 transition-all shadow" title="테마 전환(달)">
                <i data-lucide="${isDarkMode ? 'sun' : 'moon'}" class="w-5 h-5"></i>
              </button>
            </div>
            <div class="w-full flex justify-center h-0 relative">
              <div class="absolute bottom-4 z-30 w-full max-w-sm flex justify-center">
                ${activeMenuContent}
              </div>
            </div>
          </div>
        `;
      }

      // 우하단 무대 밑부분 '다음 진화 단계' 발사판
      let nextEvolutionControl = "";
      if (currentStep < maxSteps) {
        if (currentStep !== 2) { 
          const nextData = stepsData[currentStep];
          let clickEventAttr = `onclick="advanceStep(${currentStep})"`;
          if (currentStep === 19) {
            // 20단계 피날레 전에는 영화 같은 빗자루 싹쓸이 시네마틱을 소집
            clickEventAttr = `onclick="triggerBroomCinematic(() => advanceStep(19))"`;
          }

          nextEvolutionControl = `
            <div class="mt-8 flex justify-center z-20">
              <button ${clickEventAttr} class="flex items-center gap-2 px-6 py-3 bg-black dark:bg-slate-800 text-white font-mono text-sm uppercase tracking-wider shadow-lg hover:shadow-xl active:translate-y-0.5 transition-all" style="border-radius: var(--border-radius)">
                <i data-lucide="${nextData.icon}" class="w-4 h-4"></i> ${currentStep + 1}단계 진화: [${nextData.toolName}]
              </button>
            </div>
          `;
        }
      } else {
        nextEvolutionControl = `
          <div class="mt-8 flex flex-col items-center z-20 max-w-md text-center bg-green-50 dark:bg-slate-900 border border-green-200 dark:border-green-900 p-6 rounded-xl shadow-md">
            <i data-lucide="party-popper" class="w-12 h-12 text-green-500 mb-2 animate-bounce"></i>
            <h4 class="font-bold text-green-800 dark:text-green-400 text-lg">완벽한 정돈의 세계</h4>
            <p class="text-xs text-green-600 dark:text-green-500 mt-2 leading-relaxed">
              20단계를 완주하며 모든 기믹이 미니멀리즘 속으로 정리되었습니다. 아래의 타임라인 숫자를 자유롭게 클릭하며 순간이동해보세요!
            </p>
          </div>
        `;
      }

      canvasContainer.innerHTML = `
        <div class="w-full flex flex-col items-center transition-all duration-500 ${layoutWidthClass}">
          ${magnetToolbar}
          ${rulerToolbar}
          ${typographyToolbar}
          ${paletteToolbar}
          ${loadingToolbar}
          ${responsiveToolbar}
          ${minimalistControlCenter}
          <div id="grid-container" class="${gridClass} w-full">
            ${innerCards}
          </div>
          ${nextEvolutionControl}
        </div>
      `;

      lucide.createIcons();
      initAdvancedInteractions();
    }

    // 20단계 원형 플로팅 도구 내부 팝업 제어
    function togglePopMenu(menuType) {
      activePopMenu = (activePopMenu === menuType) ? null : menuType;
      renderCanvas();
    }

    // 2단계 말굽자석 작동 및 강하 정착 시스템 연출
    function triggerMagnetAlignment() {
      const magnetObj = document.getElementById('magnet-object');
      const magnetFieldLines = document.getElementById('magnet-field-lines');
      
      if (!magnetObj) return;

      magnetObj.style.top = "60px";

      setTimeout(() => {
        magnetObj.classList.add('magnet-vibrate');
        if (magnetFieldLines) magnetFieldLines.style.opacity = "1";

        const cards = document.querySelectorAll('#grid-container .raw-box');
        cards.forEach(card => {
          card.style.transition = "all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
          card.style.transform = "scale(1.04) rotate(0deg)";
          card.style.boxShadow = "0 10px 25px rgba(239, 68, 68, 0.3)"; 
        });

        setTimeout(() => {
          magnetObj.classList.remove('magnet-vibrate');
          if (magnetFieldLines) magnetFieldLines.style.opacity = "0";
          magnetObj.style.top = "-250px"; 

          setTimeout(() => {
            step2Aligned = true;
            renderCanvas();
          }, 600);
        }, 1200);

      }, 600);
    }

    // 10단계 붓: 타이포그래피 설정 변경 반영
    function changeFontConfig(type, value) {
      if (type === 'family') selectedFontFamily = value;
      if (type === 'weight') selectedFontWeight = value;
      if (type === 'size') selectedFontSize = value;
      renderCanvas();
    }

    // 16단계 모래시계 로딩 온오프
    function toggleLoadingSimulation() {
      isLoadingMode = !isLoadingMode;
      renderCanvas();
    }

    // 19단계 고무줄 화면 축 교정
    function changeSimWidth(widthClass) {
      simulatorWidthClass = widthClass;
      renderCanvas();
    }

    // 17단계 알림 토스트 출력기
    function createToast(title) {
      if (currentStep < 17 || !toastContainer) return; 
      
      const toast = document.createElement('div');
      toast.className = "bg-slate-900 text-white dark:bg-slate-800 dark:border-slate-700 border-2 border-white px-4 py-2.5 shadow-2xl flex items-center gap-2 pointer-events-auto transition-all duration-300 opacity-0 transform translate-y-2";
      toast.style.borderRadius = "0px";
      toast.innerHTML = `
        <i data-lucide="bell" class="w-4 h-4 text-yellow-400 animate-bounce"></i>
        <span class="text-xs font-bold font-mono">${title} 피드백 정보 송출완료!</span>
      `;
      
      toastContainer.appendChild(toast);
      lucide.createIcons();

      setTimeout(() => {
        toast.classList.remove('opacity-0', 'translate-y-2');
      }, 50);

      setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y--2');
        setTimeout(() => {
          toast.remove();
        }, 300);
      }, 2400);
    }

    // 다음 진화 단추 동작기
    function advanceStep(expectedStep) {
      if (currentStep === expectedStep && currentStep < maxSteps) {
        currentStep++;
        updateEvolution();
        
        if (currentStep === 13) {
          showInfoModal(
            "13단계: 설명 & 툴팁 (Speech Bubble)",
            "축하합니다! 이제 요소들의 깊이 있는 비하인드 시각 구조론을 감상할 수 있는 '도움말 말풍선'이 부착되었습니다. 각 카드 위에 마우스를 호버링시켜 가이드 창을 사색해 보세요.",
            13
          );
        }
      }
    }

    // 11단계 브랜드 칼라 지정
    function changePointColor(color) {
      selectedColor = color;
      document.documentElement.style.setProperty('--primary-color', color);
      renderCanvas();
    }

    // 고단계 정밀 상호작용 및 물리 모듈 바인딩
    function initAdvancedInteractions() {
      if (currentStep < 2) return;

      const cards = document.querySelectorAll('#grid-container .raw-box');

      // 3단계 이상일 시 줄자 슬라이더 바인딩 연계
      if (currentStep >= 3) {
        const gapSlider = document.getElementById('ruler-gap');
        const rulerValues = document.getElementById('ruler-values');

        const updateSpacing = () => {
          if (!gapSlider) return;
          rulerGapVal = parseInt(gapSlider.value);
          
          // 오직 4단계 이상일 때만 실제 Grid Gap 값을 캔버스에 주입
          if (currentStep >= 4) {
            document.documentElement.style.setProperty('--card-gap', `${rulerGapVal}px`);
          } else {
            document.documentElement.style.setProperty('--card-gap', '16px');
          }

          if (rulerValues) {
            rulerValues.textContent = `간격: ${rulerGapVal}px`;
          }
        };

        if (gapSlider) {
          gapSlider.addEventListener('input', updateSpacing);
          updateSpacing(); 
        }
      }

      // [5단계 사포 가속화 및 누적식 기전 적용 완료]
      if (currentStep === 5) {
        cards.forEach((card, idx) => {
          let sandInterval = null;
          const cardId = idx + 1;

          card.addEventListener('mouseenter', () => {
            if (sandInterval) clearInterval(sandInterval);
            sandInterval = setInterval(() => {
              if (cardRadii[cardId] < 12) { 
                cardRadii[cardId] += 1.5; // 곡률이 사포질되는 양 대폭 인상 (20ms마다 1.5px씩 깎임)
                if (cardRadii[cardId] > 12) cardRadii[cardId] = 12;
                card.style.borderRadius = `${cardRadii[cardId]}px`;
              } else {
                clearInterval(sandInterval);
              }
            }, 15);
          });

          card.addEventListener('mouseleave', () => {
            if (sandInterval) {
              clearInterval(sandInterval);
              sandInterval = null;
            }
          });
        });
      }

      // [6단계 수정] 태양의 그림자가 멈출 때만 변하는 것이 아니라, 마우스 무브 실시간 전 과정에 걸쳐 지연 없이 실시간 대동하도록 보완
      if (currentStep >= 6 && currentStep < 20) {
        document.addEventListener('mousemove', handleSunShadowRealtime);
      } else {
        document.removeEventListener('mousemove', handleSunShadowRealtime);
      }

      function handleSunShadowRealtime(e) {
        if (currentStep === 2 && !step2Aligned) return;
        
        cards.forEach(card => {
          const rect = card.getBoundingClientRect();
          const cardCenterX = rect.left + rect.width / 2;
          const cardCenterY = rect.top + rect.height / 2;

          const deltaX = cardCenterX - e.clientX;
          const deltaY = cardCenterY - e.clientY;

          const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
          const maxShadowDistance = 15;
          
          const shadowX = (deltaX / distance) * Math.min(distance * 0.05, maxShadowDistance);
          const shadowY = (deltaY / distance) * Math.min(distance * 0.05, maxShadowDistance);

          const blur = Math.min(distance * 0.03, 16) + 4;
          const opacity = Math.min(0.18, 0.04 + (distance * 0.0001));

          // 딜레이를 주는 무거운 transition 없이 직통으로 실시간 변화 부여
          card.style.boxShadow = `${shadowX}px ${shadowY}px ${blur}px rgba(0, 0, 0, ${opacity})`;
        });
      }

      // [14단계 안경 블러 복원 수정완료]: 진입 초기에 맑게 대기하며 호버 시 다른 요소만 영리하게 침전 흐림 처리
      if (currentStep >= 14 && currentStep < 20) {
        document.documentElement.style.setProperty('--blur-amount', '5px');
        cards.forEach(card => {
          card.addEventListener('mouseenter', () => {
            cards.forEach(c => {
              if (c !== card) {
                c.classList.add('blur-inactive');
                c.classList.remove('blur-active');
              } else {
                c.classList.add('blur-active');
                c.classList.remove('blur-inactive');
              }
            });
          });

          card.addEventListener('mouseleave', () => {
            cards.forEach(c => {
              c.classList.remove('blur-inactive', 'blur-active');
            });
          });
        });
      } else {
        // 14단계 미만 및 20단계 정리 후엔 블러 초기화
        document.documentElement.style.setProperty('--blur-amount', '0px');
        cards.forEach(c => {
          c.classList.remove('blur-inactive', 'blur-active');
        });
      }

      // 13단계 말풍선 툴팁 호버 트리거 연동
      if (currentStep >= 13) {
        cards.forEach(card => {
          card.addEventListener('mouseenter', () => card.classList.add('tooltip-active'));
          card.addEventListener('mouseleave', () => card.classList.remove('tooltip-active'));
        });
      }
    }

    // 카드 터치 혹은 클릭 처리 제어소
    function onCardClick(e, cardId) {
      if (e.target.closest('input') || e.target.closest('select') || e.target.closest('button')) return;

      const card = document.getElementById(`card-${cardId}`);
      if (!card) return;

      // 12단계 전구 점등 타겟 선정
      if (currentStep >= 12) {
        activeCardId = cardId;
        document.querySelectorAll('#grid-container .raw-box').forEach(c => {
          c.classList.remove('bulb-active-border');
        });
        card.classList.add('bulb-active-border');
      }

      if (currentStep >= 17) {
        createToast(`Card 0${cardId}`);
      }

      // [9단계 수정 완료]: 기존 프레임 뚝뚝 끊기던 현상을 쫀득한 밀착 베지에 물리이징 곡선과 미세 지연 연계로 부드럽게 완벽 개선
      if (currentStep >= 9) {
        card.style.transform = "scale(0.88) translateY(4px)";
        card.style.transition = "transform 0.1s cubic-bezier(0.25, 1, 0.5, 1)";
        
        setTimeout(() => {
          card.style.transform = "scale(1.05) translateY(-3px)";
          card.style.transition = "transform 0.14s cubic-bezier(0.175, 0.885, 0.32, 1.4)";
          
          setTimeout(() => {
            card.style.transform = "";
            card.style.transition = "transform 0.25s ease"; 
            fireCardContentOutput(cardId);
          }, 140);
        }, 100);
      } else {
        fireCardContentOutput(cardId);
      }
    }

    // 모달 혹은 사이드 커튼 세부 설명 창 소환 제어
    function fireCardContentOutput(cardId) {
      const stepDetail = stepsData[currentStep - 1];
      const descText = stepsData[currentStep - 1]?.desc || "클릭 반동 피드백이 완벽히 가동되었습니다!";

      if (currentStep >= 15 && curtainTitle && curtainBody && curtainOverlay) {
        curtainTitle.textContent = `${currentStep}단계: ${stepDetail.title}`;
        curtainBody.innerHTML = `
          <div class="space-y-4">
            <p class="font-bold text-gray-800 dark:text-white text-base">선택된 타겟: Card 0${cardId}</p>
            <div class="p-3 bg-blue-50 dark:bg-slate-700 border-l-4 border-blue-500 font-mono text-xs text-blue-800 dark:text-blue-200 rounded">
              "사이드 레이어로 정보를 호출하여 화면 전환 비용을 극단적으로 단축시킵니다."
            </div>
            <p class="text-xs text-gray-600 dark:text-gray-300 leading-relaxed">${descText}</p>
          </div>
        `;
        curtainOverlay.classList.remove('translate-x-full');
      } else {
        showInfoModal(
          `${currentStep}단계: ${stepDetail?.title || "상호작용"}`,
          descText,
          currentStep
        );
      }
    }

    // 모달창 활성화 및 제어
    function showInfoModal(title, desc, stepNum) {
      if (!modalTitle || !modalDesc || !modalMeta || !infoModal || !infoModalContent) return;
      modalTitle.innerHTML = `<i data-lucide="${stepsData[stepNum-1]?.icon || 'info'}" class="text-blue-600 w-6 h-6 inline-block mr-2"></i> ${title}`;
      modalDesc.textContent = desc;
      modalMeta.textContent = `현재 누적 활성화 단계: Step ${stepNum} / 20`;

      infoModal.classList.remove('opacity-0', 'pointer-events-none');
      infoModalContent.classList.remove('scale-95');
      infoModalContent.classList.add('scale-100');

      lucide.createIcons();
    }

    function closeModal() {
      if (!infoModal || !infoModalContent) return;
      infoModal.classList.add('opacity-0', 'pointer-events-none');
      infoModalContent.classList.add('scale-95');
      infoModalContent.classList.remove('scale-100');
    }

    // 시스템 전체 리셋 기전
    function triggerFullReset() {
      currentStep = 0;
      selectedColor = '#3b82f6';
      step2Aligned = false;
      timelineUnlocked = false; 
      rulerGapVal = 16;
      cardRadii = { 1: 0, 2: 0, 3: 0, 4: 0 }; 
      selectedFontFamily = 'font-sans';
      selectedFontWeight = 'font-normal';
      selectedFontSize = 'text-xs';
      activeCardId = null;
      isLoadingMode = false;
      simulatorWidthClass = 'max-w-2xl';
      activePopMenu = null;

      if (curtainOverlay) curtainOverlay.classList.add('translate-x-full');
      if (toastContainer) toastContainer.innerHTML = "";
      
      // 야간 모드 복구 초기화
      isDarkMode = false;
      applyDarkModeState();
      if (nightToggleBtn) nightToggleBtn.classList.add('hidden');

      document.body.style.backgroundColor = '#ffffff';
      document.documentElement.style.setProperty('--primary-color', '#3b82f6');
      document.documentElement.style.setProperty('--card-gap', '16px');
      
      if (siteLogo) {
        siteLogo.textContent = "Raw Canvas";
        siteLogo.className = "text-xl md:text-2xl font-black tracking-wider uppercase";
      }
      if (mainHeader) {
        mainHeader.className = "w-full max-w-5xl mx-auto z-10 flex justify-between items-center py-4 border-b-2 border-black transition-all duration-700";
      }
      
      if (guideTitle && guideDesc) {
        guideTitle.textContent = "완전히 비어 있는 원시 상태입니다.";
        guideTitle.className = "text-lg font-bold text-gray-800";
        guideDesc.textContent = "무언가 일어날 때까지 잠시 기다리거나 상자를 지켜보세요...";
      }
      
      if (badgeStep) badgeStep.textContent = "Step 0 / 20";
      if (progressPercent) progressPercent.textContent = "0% Evolution";

      if (timelineContainer) {
        timelineContainer.classList.add('hidden-initially');
        timelineContainer.classList.remove('visible-step');
      }
      if (timelineUnlockTag) timelineUnlockTag.classList.add('hidden');
      if (resetBtn) resetBtn.classList.add('hidden');

      // 페인트통 도구 복구 및 노출 슬라이딩 동작 실행
      if (paintBucketTool) {
        paintBucketTool.style.display = 'flex';
        paintBucketTool.className = "paint-bucket-sliding bg-blue-600 text-white p-4 rounded-full shadow-2xl flex items-center justify-center border-2 border-white hover:scale-110 active:scale-95 transition-transform";
        setTimeout(() => {
          paintBucketTool.classList.add('active');
        }, 150);
      }

      renderCanvas();
      renderTimelineLabels();
      lucide.createIcons();
    }
  </script>
</body>
</html>
