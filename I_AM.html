<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Evolution of Design - 20단계의 기적</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Tailwind CSS 다크모드 클래스 가동 바인딩 설정 -->
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --primary-color: #3b82f6;
      --bg-color: #ffffff;
      --card-bg: #ffffff;
      --text-color: #1f2937;
      --border-color: #cbd5e1;
      --border-radius: 0px;
      --box-shadow: 0px 0px 0px rgba(0,0,0,0);
      --card-gap: 16px;
      --blur-amount: 0px;
      --card-border-width: 1px;
    }

    /* 부드러운 하이테크 스타일 페이드 연출용 트랜지션 통합 선언 */
    body, header, main, div, button, select, p, h1, h2, h3, h4, span, input, select {
      transition: background-color 0.8s cubic-bezier(0.25, 0.8, 0.25, 1), 
                  border-color 0.8s cubic-bezier(0.25, 0.8, 0.25, 1), 
                  color 0.5s ease-in-out,
                  box-shadow 0.3s ease-in-out,
                  transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      overflow-x: hidden;
    }

    /* 야간 모드 시 확실한 심해 다크 테마 전환 */
    body.dark-mode-theme {
      --bg-color: #0b0f19;
      --text-color: #f1f5f9;
      --card-bg: #1e293b;
      --border-color: #334155;
    }

    .raw-box {
      border: var(--card-border-width) solid var(--border-color);
      background-color: var(--card-bg);
      border-radius: var(--border-radius);
      box-shadow: var(--box-shadow);
      padding: 24px;
      width: 100%;
      min-height: 180px;
      box-sizing: border-box;
    }

    /* 5단계 전용 톱 커서 */
    .saw-cursor-active {
      cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 24 24' fill='none' stroke='%23ef4444' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M22 2 2 22'/><path d='M16 8h4v4'/><path d='M12 12h4v4'/><path d='M8 16h4v4'/></svg>") 0 22, pointer !important;
    }

    /* 도구 슬라이딩용 트랜지션 물리 애니메이션 */
    @keyframes slide-from-left {
      0% { transform: translateX(-120vw) rotate(-30deg); opacity: 0; }
      100% { transform: translateX(0) rotate(0deg); opacity: 1; }
    }
    @keyframes slide-from-right {
      0% { transform: translateX(120vw) rotate(30deg); opacity: 0; }
      100% { transform: translateX(0) rotate(0deg); opacity: 1; }
    }
    @keyframes slide-from-top {
      0% { transform: translateY(-120vh); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes slide-from-bottom {
      0% { transform: translateY(120vh); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    .tool-slide-left { animation: slide-from-left 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards; }
    .tool-slide-right { animation: slide-from-right 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards; }
    .tool-slide-top { animation: slide-from-top 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards; }
    .tool-slide-bottom { animation: slide-from-bottom 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards; }

    .absorb-animation {
      transition: transform 0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045), opacity 0.8s ease, scale 0.8s ease;
      transform: translate(var(--dest-x, 0px), var(--dest-y, 0px)) scale(0.1) rotate(720deg) !important;
      opacity: 0 !important;
      pointer-events: none;
    }

    #paint-ripple {
      position: fixed;
      border-radius: 50%;
      transform: scale(0);
      pointer-events: none;
      z-index: 30;
      transition: transform 1.2s cubic-bezier(0.1, 0.8, 0.3, 1);
    }

    /* 자석 수축 오토 물리 진동 */
    @keyframes magnet-shaking {
      0%, 100% { transform: translateX(-50%) rotate(0deg); }
      15% { transform: translateX(-50%) rotate(-7deg); }
      30% { transform: translateX(-50%) rotate(6deg); }
      45% { transform: translateX(-50%) rotate(-5deg); }
      60% { transform: translateX(-50%) rotate(4deg); }
      75% { transform: translateX(-50%) rotate(-2deg); }
    }
    .magnet-vibrate {
      animation: magnet-shaking 0.4s ease-in-out infinite;
    }

    .grid-container {
      display: grid;
      gap: var(--card-gap);
      transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    /* 4단계 격자 종이 실선 패턴 구현 */
    .grid-bg-active {
      background-image: 
        linear-gradient(to right, rgba(148, 163, 184, 0.15) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(148, 163, 184, 0.15) 1px, transparent 1px);
      background-size: 30px 30px;
    }
    body.dark-mode-theme .grid-bg-active {
      background-image: 
        linear-gradient(to right, rgba(51, 65, 85, 0.3) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(51, 65, 85, 0.3) 1px, transparent 1px);
    }

    /* 14단계 안경 필터 효과 */
    .blur-inactive {
      filter: blur(var(--blur-amount));
      opacity: 0.5;
      transition: filter 0.4s ease, opacity 0.4s ease;
    }
    .blur-active {
      filter: blur(0px) !important;
      opacity: 1 !important;
      transform: scale(1.04);
      z-index: 10;
    }

    /* 20단계 빗자루 클린업 미니멀 플랫 카드 (더 또렷한 라이트 라인) */
    .minimal-flat {
      background: var(--card-bg) !important;
      border: 1.5px solid var(--border-color) !important;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.025) !important;
      border-radius: 12px !important;
      transition: all 0.3s ease !important;
    }
    .minimal-flat:hover {
      transform: translateY(-4px) !important;
      box-shadow: 0 10px 20px -3px rgba(0, 0, 0, 0.08) !important;
    }

    .hidden-initially {
      opacity: 0;
      pointer-events: none;
      transform: translateY(20px);
      transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .visible-step {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    /* 툴팁 말풍선 */
    .tooltip-balloon {
      position: absolute;
      bottom: 110%;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background-color: #1e293b;
      color: #ffffff;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      z-index: 50;
    }
    .tooltip-balloon::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border-width: 6px;
      border-style: solid;
      border-color: #1e293b transparent transparent transparent;
    }
    .tooltip-active .tooltip-balloon {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* 빗자루 쓸기 연출 컨테이너 */
    #broom-cinematic-container {
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
      overflow: hidden;
      display: none;
    }
    @keyframes broom-sweep-across {
      0% { transform: translate(-100vw, 15vh) rotate(-45deg); }
      35% { transform: translate(-20vw, -10vh) rotate(15deg); }
      65% { transform: translate(30vw, -15vh) rotate(-15deg); }
      100% { transform: translate(120vw, 15vh) rotate(45deg); }
    }
    .broom-animating {
      animation: broom-sweep-across 1.8s cubic-bezier(0.645, 0.045, 0.355, 1) forwards;
    }
    .cinematic-blur-effect {
      filter: blur(15px);
      transition: filter 0.8s ease-in-out;
    }

    .paint-bucket-sliding {
      position: fixed;
      bottom: -150px;
      left: -150px;
      z-index: 50;
      cursor: pointer;
      transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
    }
    .paint-bucket-sliding.active {
      bottom: 40px;
      left: 40px;
    }
    @keyframes suck-into-box {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
      100% { transform: translate(var(--suck-x), var(--suck-y)) scale(0) rotate(720deg); opacity: 0; }
    }
    .paint-bucket-sliding.sucking {
      animation: suck-into-box 0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards;
      pointer-events: none;
    }

    /* 12단계 전구 테두리 포커싱 빛 */
    .bulb-active-border {
      border-color: var(--primary-color) !important;
      box-shadow: 0 0 15px var(--primary-color) !important;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-4 md:p-8 relative selection:bg-blue-200">

  <!-- 페인트 버스트용 고정 노드 -->
  <div id="paint-ripple"></div>

  <!-- 2단계: U자형 클래식 말굽자석 -->
  <div id="magnet-object" class="fixed left-1/2 -translate-x-1/2 top-[-250px] w-48 h-48 z-40 pointer-events-none filter drop-shadow-2xl transition-all duration-700">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
      <path d="M20 50 C20 25, 30 15, 50 15 C70 15, 80 25, 80 50 L80 55 C80 55, 60 55, 60 55 L60 50 C60 38, 55 35, 50 35 C45 35, 40 38, 40 50 L40 55 L20 55 Z" fill="#ef4444" />
      <path d="M50 15 C70 15, 80 25, 80 50 L80 55 L60 55 L60 50 C60 38, 55 35, 50 35 Z" fill="#3b82f6" />
      <rect x="20" y="55" width="20" height="8" fill="#e2e8f0" rx="1" />
      <rect x="60" y="55" width="20" height="8" fill="#e2e8f0" rx="1" />
      <text x="27" y="51" fill="#ffffff" font-size="9" font-weight="900" font-family="monospace">N</text>
      <text x="67" y="51" fill="#ffffff" font-size="9" font-weight="900" font-family="monospace">S</text>
      <path d="M30 70 L30 85 M70 70 L70 85 M50 68 L50 90" stroke="#fcd34d" stroke-width="3" stroke-linecap="round" opacity="0" id="magnet-field-lines" />
    </svg>
  </div>

  <!-- 빗자루 싹쓸이 연출 노드 -->
  <div id="broom-cinematic-container">
    <div id="sweeper-object" class="absolute left-0 top-1/4 w-96 h-96 opacity-90 drop-shadow-[0_20px_50px_rgba(0,0,0,0.35)]">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
        <rect x="75" y="5" width="6" height="50" rx="3" transform="rotate(35 75 5)" fill="#b45309" />
        <ellipse cx="48" cy="46" rx="9" ry="5" transform="rotate(35 48 46)" fill="#d97706" />
        <path d="M44 48 L20 85 C15 92, 45 98, 55 92 L53 50 Z" fill="#fcd34d" />
        <path d="M42 52 L26 84" stroke="#d97706" stroke-width="1.5" />
        <path d="M45 52 L35 88" stroke="#d97706" stroke-width="1.5" />
        <circle cx="18" cy="90" r="3" fill="#60a5fa" opacity="0.9" />
        <circle cx="58" cy="85" r="2.5" fill="#10b981" opacity="0.8" />
      </svg>
    </div>
  </div>

  <!-- 토스트 알림창 컨테이너 -->
  <div id="toast-container" class="fixed top-6 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <!-- 15단계 커튼: 모달 사이드 슬라이더 -->
  <div id="curtain-overlay" class="fixed inset-y-0 right-0 w-full md:w-96 bg-white dark:bg-slate-800 border-l-4 border-black dark:border-slate-600 z-40 transform translate-x-full transition-transform duration-500 ease-in-out shadow-2xl flex flex-col justify-between p-6">
    <div>
      <div class="flex justify-between items-center border-b-2 border-black dark:border-slate-600 pb-4 mb-4">
        <h3 id="curtain-title" class="text-xl font-black">레이어 상세</h3>
        <button id="curtain-close" class="text-gray-500 hover:text-red-500 font-bold text-4xl p-2 w-12 h-12 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">&times;</button>
      </div>
      <div id="curtain-body" class="text-sm text-gray-700 dark:text-gray-300 leading-relaxed">
        내부 상세 구조 정보 레이어입니다.
      </div>
    </div>
    <div class="bg-gray-100 dark:bg-slate-950 p-4 font-mono text-xs text-gray-500 rounded-md">
      <p>Step 15: Curtain Layer [Active]</p>
    </div>
  </div>

  <!-- 헤더 영역 -->
  <header class="w-full max-w-5xl mx-auto z-10 flex justify-between items-center py-4 border-b-2 border-black dark:border-slate-700 transition-all duration-700" id="main-header">
    <div>
      <h1 class="text-xl md:text-2xl font-black tracking-wider uppercase" id="site-logo">Raw Canvas</h1>
      <p class="text-xs text-gray-500 mt-1" id="site-subtitle">가장 날것의 상자에서 시작하는 디자인 여행</p>
    </div>
    <div class="flex items-center gap-4 text-right">
      <button id="reset-btn" class="hidden px-2.5 py-1 text-[10px] font-mono font-bold uppercase border border-red-500 text-red-500 hover:bg-red-500 hover:text-white active:scale-95 transition-all rounded-md">
        Reset
      </button>
      <div>
        <span class="text-xs font-mono bg-black text-white px-2 py-1 uppercase tracking-widest rounded-none transition-all duration-700" id="badge-step">
          Step 0 / 20
        </span>
        <div class="text-xs text-gray-400 mt-1 font-mono" id="progress-percent">0% Evolution</div>
      </div>
    </div>
  </header>

  <!-- 0단계 전용: 화면 밖에서 나타나는 슬라이딩 페인트통 도구 -->
  <div id="paint-bucket-tool" class="paint-bucket-sliding bg-blue-600 text-white p-4 rounded-full shadow-2xl flex items-center justify-center border-2 border-white hover:scale-110 active:scale-135 transition-transform" onclick="triggerSuckInAnimation()">
    <i data-lucide="paint-bucket" class="w-20 h-20 animate-bounce"></i>
  </div>

  <!-- 메인 워크 랩 -->
  <main id="main-content-wrap" class="flex-grow w-full max-w-5xl mx-auto flex flex-col justify-center items-center py-8 md:py-16 z-10">
    
    <!-- 진화 가이드 피드백 텍스트 -->
    <div id="guide-message" class="text-center mb-8 max-w-xl transition-all duration-500">
      <p class="text-lg font-bold text-gray-800 dark:text-white" id="guide-title">완전히 비어 있는 원시 상태입니다.</p>
      <p class="text-sm text-gray-500 mt-2" id="guide-desc">무언가 일어날 때까지 잠시 기다리거나 상자를 지켜보세요...</p>
    </div>

    <!-- 카드 뷰포트 영역 상단 우측 야간모드 스위치 위치 (7~19단계 전용) -->
    <div class="w-full max-w-2xl flex justify-end pr-2 mb-4">
      <button id="night-toggle-btn" class="hidden flex items-center gap-1.5 px-3 py-1.5 rounded-full border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-amber-500 dark:text-sky-400 hover:scale-105 active:scale-95 transition-all text-xs font-bold shadow-sm">
        <span id="night-toggle-label" class="mr-1">라이트 모드</span>
        <i data-lucide="sun" id="sun-toggle-icon" class="w-4 h-4"></i>
        <i data-lucide="moon" id="moon-toggle-icon" class="w-4 h-4 hidden"></i>
      </button>
    </div>

    <!-- 임포턴트: 진입하는 도구(사물) 임시 정착 스테이지 -->
    <div id="immersive-tool-stage" class="w-full flex justify-center items-center my-4 min-h-[120px]">
      <!-- 도구가 동적으로 마운트되는 슬라이딩 존 -->
    </div>

    <!-- 핵심 디자인 변화 캔버스 컨테이너 -->
    <div id="canvas-container" class="w-full flex justify-center items-center min-h-[300px] transition-all duration-500">
      
      <!-- [0단계] 최초 시작 시 보이는 상자 -->
      <div id="initial-start-box" class="raw-box w-64 h-64 flex flex-col justify-center items-center relative transition-all duration-500">
        <span class="text-sm font-black text-gray-800 dark:text-gray-100 uppercase tracking-widest text-center" id="empty-box-text">EMPTY BOX</span>
        <span class="text-[10px] text-gray-400 mt-2 font-mono" id="empty-box-sub">Ready for Color</span>
      </div>

    </div>

    <!-- 진화 단계 타임라인 시각 기구 -->
    <div id="timeline-container" class="w-full mt-12 hidden-initially">
      <div class="flex justify-between text-xs font-mono text-gray-400 mb-2">
        <span class="flex items-center gap-1">
          Evolution Steps 
          <span id="timeline-unlock-tag" class="hidden text-green-600 bg-green-100 dark:bg-green-950 px-1.5 py-0.5 rounded text-[10px] font-bold animate-pulse">🔓 자유 순간이동 해금됨</span>
        </span>
        <span id="timeline-count">0 / 20</span>
      </div>
      <div class="w-full bg-gray-200 dark:bg-slate-800 h-2 rounded-full overflow-hidden">
        <div id="timeline-bar" class="bg-blue-600 h-full w-0 transition-all duration-500"></div>
      </div>
      <div class="grid grid-cols-5 md:grid-cols-20 gap-1 mt-2 text-[9px] text-center font-mono text-gray-400" id="timeline-steps-labels">
        <!-- JS 동적 주입 -->
      </div>
    </div>

  </main>

  <!-- 안내 상세 모달 -->
  <div id="info-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 opacity-0 pointer-events-none transition-opacity duration-300">
    <div id="info-modal-content" class="bg-white dark:bg-slate-800 border-2 border-black dark:border-slate-700 w-full max-w-md p-6 shadow-2xl transform scale-95 transition-transform duration-300 rounded-none relative">
      <button id="modal-close" class="absolute top-4 right-4 text-gray-400 hover:text-red-500 font-bold text-4xl p-2 w-12 h-12 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">&times;</button>
      <h3 id="modal-title" class="text-lg font-black mb-3 text-gray-900 dark:text-white">제목</h3>
      <p id="modal-desc" class="text-sm text-gray-600 dark:text-gray-300 leading-relaxed mb-6">설명문</p>
      <div class="flex justify-between items-center pt-4 border-t border-gray-100 dark:border-slate-700">
        <span id="modal-meta" class="text-[10px] font-mono text-gray-400">Step 정보</span>
        <button id="modal-confirm" class="px-4 py-1.5 bg-black dark:bg-slate-750 text-white font-bold text-xs uppercase tracking-wider rounded hover:bg-gray-800 dark:hover:bg-slate-600 transition-colors">확인</button>
      </div>
    </div>
  </div>

  <script>
    let currentStep = 0;
    const maxSteps = 20;
    
    let colorPalette = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#14b8a6', '#6366f1'];
    let selectedColor = '#3b82f6';
    
    let step2Aligned = false; 
    let timelineUnlocked = false; 
    let isDarkMode = false;
    let lightThemeBackground = '#ffffff';
    
    // 이 단계에서 사용자가 도구를 눌렀는지 확인하는 플래그
    let isToolActivatedThisStep = false;

    // 3단계 줄자 슬라이더 조절값 (기본 16)
    let rulerGapVal = 16;

    // 5단계 톱 카드별 둥글기 상태값 누적 저장소 (기본 0px 시작)
    let cardRadii = { 1: 0, 2: 0, 3: 0, 4: 0 };

    // 10단계 붓 타이포그래피 스타일값
    let selectedFontFamily = 'font-sans';
    let selectedFontWeight = 'font-normal';
    let selectedFontSize = 'text-xs';

    // 12단계 활성(Active) 상태 변수
    let activeCardId = null;

    // 16단계 모래시계 시뮬레이터 플래그
    let isLoadingMode = false;

    function triggerSuckInAnimation() {
      const tool = document.getElementById('paint-bucket-tool');
      const targetBox = document.getElementById('initial-start-box');

      if (!tool || !targetBox) return;

      const toolRect = tool.getBoundingClientRect();
      const boxRect = targetBox.getBoundingClientRect();

      const destX = (boxRect.left + boxRect.width / 2) - (toolRect.left + toolRect.width / 2);
      const destY = (boxRect.top + boxRect.height / 2) - (toolRect.top + toolRect.height / 2);

      tool.style.setProperty('--suck-x', `${destX}px`);
      tool.style.setProperty('--suck-y', `${destY}px`);

      tool.classList.add('sucking');

      setTimeout(() => {
        targetBox.style.transform = "scale(0.92) rotate(-3deg)";
        targetBox.style.borderColor = "#2563eb";
      }, 400);

      setTimeout(() => {
        targetBox.style.transform = "scale(1.05) rotate(0deg)";
        setTimeout(() => {
          targetBox.style.transform = "";
          targetBox.style.borderColor = "";
          
          currentStep = 1;
          isToolActivatedThisStep = false; 
          updateEvolution();
        }, 150);
      }, 800);
    }

    function toggleThemeMode() {

        if (moonToggleIcon) moonToggleIcon.classList.remove('hidden');
        if (nightToggleLabel) nightToggleLabel.textContent = "다크 모드";
      } else {

        document.body.classList.remove('dark-mode-theme');

      }
      renderCanvas();
    }

    function renderTimelineLabels() {
      if (!timelineStepsLabels) return;
      let html = "";
      for (let i = 1; i <= maxSteps; i++) {
        const isCurrent = i === currentStep;
        const isPassed = i <= currentStep;
        let colorClass = "text-gray-400 dark:text-gray-600";
        if (isCurrent) {
          colorClass = "text-blue-600 dark:text-blue-400 font-black scale-110";
        } else if (isPassed) {
          colorClass = "text-slate-800 dark:text-slate-200 font-bold";
        }
        
        let cursorClass = timelineUnlocked ? "cursor-pointer hover:text-blue-500 hover:scale-110 transition-transform" : "cursor-default";
        let clickHandler = timelineUnlocked ? `onclick="handleTimelineJump(${i})"` : "";
        
        html += `
          <div class="${colorClass} ${cursorClass} flex flex-col items-center justify-center p-0.5" ${clickHandler} title="${stepsData[i-1]?.title || ''}">
            <span class="text-[9px] md:text-xs">${i}</span>
          </div>
        `;
      }
      timelineStepsLabels.innerHTML = html;
    }

    function handleTimelineJump(stepNum) {
      if (!timelineUnlocked) return;
      
      if (stepNum === 20) {
        // 타임라인을 통해 20단계 이동 시에도 즉시 정돈화면 적용
        triggerBroomCinematic(completeStep20);
      } else {
        currentStep = stepNum;
        isToolActivatedThisStep = true; 
        if (currentStep >= 2) {
          step2Aligned = true; 
        } else {
          step2Aligned = false;
        }
        updateEvolution();
      }
    }

    function completeStep20() {
      currentStep = 20;
      step2Aligned = true;
      isToolActivatedThisStep = true;
      isDarkMode = false;
      applyDarkModeState();
      updateEvolution();
    }

    function triggerBroomCinematic(onCompleteCallback) {
      const broomContainer = document.getElementById('broom-cinematic-container');
      const broomObject = document.getElementById('sweeper-object');
      const mainWrap = document.getElementById('main-content-wrap');

      if (!broomContainer || !broomObject || !mainWrap) return;

      broomContainer.style.display = 'block';
      broomObject.classList.remove('broom-animating');
      mainWrap.classList.add('cinematic-blur-effect');

      void broomObject.offsetWidth; // 리플로우 강제 트리거

      broomObject.classList.add('broom-animating');

      // 쓱 쓰는 타격 시점에 즉시 데이터 전환
      setTimeout(() => {
        if (onCompleteCallback) onCompleteCallback();
      }, 900);

      setTimeout(() => {
        mainWrap.classList.remove('cinematic-blur-effect');
        broomContainer.style.display = 'none';
        broomObject.classList.remove('broom-animating');
      }, 1800);
    }

    function updateEvolution() {
      if (currentStep > 0 && paintBucketTool) {
        paintBucketTool.classList.remove('active');
        setTimeout(() => { paintBucketTool.style.display = 'none'; }, 500);
      }

      if (currentStep === 20 && timelineUnlockTag) {
        timelineUnlocked = true;
        timelineUnlockTag.classList.remove('hidden');
      }

      if (badgeStep) badgeStep.textContent = `Step ${currentStep} / ${maxSteps}`;
      if (progressPercent) progressPercent.textContent = `${currentStep * 5}% Evolution`;
      if (timelineCount) timelineCount.textContent = `${currentStep} / ${maxSteps}`;
      if (timelineBar) timelineBar.style.width = `${currentStep * 5}%`;

      // 7~19단계 전용 야간 스위치 가시성 제어 (20단계는 자체 다이얼 연동)
      if (currentStep >= 7 && currentStep < 20) {
        if (nightToggleBtn) nightToggleBtn.classList.remove('hidden');
      } else {
        if (nightToggleBtn) nightToggleBtn.classList.add('hidden');
      }

      // 사포가 지나간 6단계 이상 시에는 기본 곡률(12px)을 확실하게 고정 적용
      if (currentStep >= 6) {
        cardRadii = { 1: 12, 2: 12, 3: 12, 4: 12 };
      }

      // 5단계 전용 톱 마우스 커서 적용
      if (currentStep === 5 && isToolActivatedThisStep) {
        document.body.classList.add('saw-cursor-active');
      } else {
        document.body.classList.remove('saw-cursor-active');
      }

      renderTimelineLabels();

      if (currentStep > 0 && currentStep <= maxSteps && guideTitle && guideDesc) {
        const currentData = stepsData[currentStep - 1];
        if (!isToolActivatedThisStep) {
          guideTitle.textContent = `${currentStep}단계: [${currentData.toolName}] 획득 대기 중`;
          guideDesc.textContent = `아래 출현한 [${currentData.toolName}] 오브젝트를 클릭하여 기능을 활성화하세요. 카드 캔버스는 무대 위에 상시 보존됩니다!`;
        } else {
          guideTitle.textContent = `${currentStep}단계: ${currentData.title} 활성화!`;
          guideDesc.textContent = currentData.actionDesc;
        }
      }

      if (currentStep > 0 && resetBtn && timelineContainer) {
        resetBtn.classList.remove('hidden');
        timelineContainer.classList.add('visible-step');
        timelineContainer.classList.remove('hidden-initially');
      }

      if (currentStep >= 1 && siteLogo && mainHeader) {
        siteLogo.textContent = "Creative Sandbox";
        siteLogo.className = "text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-sky-400 dark:to-indigo-400";
        mainHeader.classList.remove('border-black');
        mainHeader.classList.add('border-slate-200', 'dark:border-slate-700');
      }

      renderCanvas();
      renderImmersiveTool();
    }

    // 1단계: 두 번째 코드와 동일하게 목표 배경색은 한 번만 지정하고,
    // CSS transition이 자연스럽게 보간하도록 처리한다.
    function bindStep1HoldEvent() {
      const box1 = document.getElementById('box-1');
      const holdFiller = document.getElementById('hold-filler');
      const stageSuccessMark = document.getElementById('stage-success-mark');
      const stageInnerWrapper = document.getElementById('stage-inner-wrapper');

      if (!box1 || !holdFiller || !stageSuccessMark || !stageInnerWrapper) return;

      let holdTimer = null;
      let drainTimer = null;
      let progress = 0;
      let completed = false;

      const setPageBackground = (color) => {
        if (isDarkMode) return;
        document.documentElement.style.setProperty('--bg-color', color);
        document.body.style.backgroundColor = color;
      };

      const clearTimers = () => {
        if (holdTimer) {
          clearInterval(holdTimer);
          holdTimer = null;
        }
        if (drainTimer) {
          clearInterval(drainTimer);
          drainTimer = null;
        }
      };

      const completeStep = () => {
        if (completed) return;
        completed = true;
        clearTimers();
        progress = 100;
        holdFiller.style.transform = 'scaleY(1)';

        // 최종 배경색을 라이트 테마의 기준색으로 저장해 이후 다크/라이트 전환에도 유지한다.
        lightThemeBackground = '#dbeafe';
        setPageBackground(lightThemeBackground);

        stageInnerWrapper.classList.add('opacity-0');
        stageSuccessMark.classList.remove('hidden');

        requestAnimationFrame(() => {
          stageSuccessMark.classList.remove('scale-0');
          stageSuccessMark.classList.add('scale-100');
        });

        setTimeout(() => {
          currentStep = 2;
          isToolActivatedThisStep = false;
          updateEvolution();
        }, 700);
      };

      const startHolding = (e) => {
        if (completed) return;
        e.preventDefault();
        clearTimers();

        // 두 번째 코드처럼 목표색을 한 번만 지정한다.
        // body의 0.8초 transition이 자연스럽게 색을 보간한다.
        setPageBackground('#dbeafe');

        holdTimer = setInterval(() => {
          progress = Math.min(progress + 3, 100);
          holdFiller.style.transform = `scaleY(${progress / 100})`;

          if (progress >= 100) {
            completeStep();
          }
        }, 20);
      };

      const stopHolding = () => {
        if (completed) return;

        if (holdTimer) {
          clearInterval(holdTimer);
          holdTimer = null;
        }

        // 중간에 손을 떼면 배경색도 한 번만 원래 상태로 되돌린다.
        setPageBackground('#ffffff');

        if (drainTimer) clearInterval(drainTimer);
        drainTimer = setInterval(() => {
          progress = Math.max(progress - 5, 0);
          holdFiller.style.transform = `scaleY(${progress / 100})`;

          if (progress <= 0) {
            clearInterval(drainTimer);
            drainTimer = null;
          }
        }, 15);
      };

      box1.addEventListener('mousedown', startHolding);
      box1.addEventListener('touchstart', startHolding, { passive: false });
      window.addEventListener('mouseup', stopHolding);
      window.addEventListener('touchend', stopHolding);
      window.addEventListener('touchcancel', stopHolding);
      box1.addEventListener('mouseleave', stopHolding);
    }

    function renderImmersiveTool() {
      if (!immersiveToolStage) return;

      // 이미 이 단계의 도구가 클릭되어 적용되었다면 도구 출현대를 비움
      if (currentStep === 0 || currentStep >= 20 || currentStep > maxSteps || isToolActivatedThisStep) {
        immersiveToolStage.innerHTML = "";
        return;
      }

      const currentData = stepsData[currentStep - 1];
      let slideClass = "tool-slide-bottom";
      if (currentData.slideDir === "left") slideClass = "tool-slide-left";
      if (currentData.slideDir === "right") slideClass = "tool-slide-right";
      if (currentData.slideDir === "top") slideClass = "tool-slide-top";

      // 단계별 고유 SVG 사물 빌더
      let toolSvg = "";
      if (currentData.id === 2) {
        toolSvg = `<i data-lucide="magnet" class="w-12 h-12 text-red-500"></i>`;
      } else if (currentData.id === 3) {
        toolSvg = `<i data-lucide="ruler" class="w-12 h-12 text-amber-500 rotate-45"></i>`;
      } else if (currentData.id === 4) {
        toolSvg = `<i data-lucide="layout-grid" class="w-12 h-12 text-emerald-500"></i>`;
      } else if (currentData.id === 5) {
        toolSvg = `
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-16 h-16 stroke-red-600 animate-pulse" stroke-width="2">
            <path d="M22 2 L2 22 M18 6 L18 10 M14 10 L14 14 M10 14 L10 18 M6 18 L6 22" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>`;
      } else if (currentData.id === 6) {
        toolSvg = `<i data-lucide="sun" class="w-16 h-16 text-amber-500 animate-spin" style="animation-duration: 10s"></i>`;
      } else if (currentData.id === 7) {
        toolSvg = `<i data-lucide="moon" class="w-12 h-12 text-indigo-400"></i>`;
      } else if (currentData.id === 8) {
        toolSvg = `<i data-lucide="mouse-pointer" class="w-12 h-12 text-blue-500"></i>`;
      } else if (currentData.id === 9) {
        // 기존 번개 모양을 지우고 9단계 나선형 코일 스프링(Helix Spring) 전면 이식
        toolSvg = `
          <svg viewBox="0 0 100 100" class="w-12 h-12 text-yellow-500 animate-pulse" stroke="currentColor" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M50 12 C25 20, 25 32, 50 40 C75 48, 75 60, 50 68 C25 76, 25 84, 50 90" />
          </svg>`;
      } else if (currentData.id === 10) {
        toolSvg = `<i data-lucide="brush" class="w-12 h-12 text-purple-500"></i>`;
      } else if (currentData.id === 11) {
        toolSvg = `<i data-lucide="palette" class="w-12 h-12 text-teal-500"></i>`;
      } else if (currentData.id === 12) {
        toolSvg = `<i data-lucide="lightbulb" class="w-12 h-12 text-yellow-400"></i>`;
      } else if (currentData.id === 13) {
        toolSvg = `<i data-lucide="message-square" class="w-12 h-12 text-indigo-500"></i>`;
      } else if (currentData.id === 14) {
        toolSvg = `<i data-lucide="glasses" class="w-12 h-12 text-blue-400"></i>`;
      } else if (currentData.id === 15) {
        toolSvg = `<i data-lucide="panels-right" class="w-12 h-12 text-slate-500"></i>`;
      } else if (currentData.id === 16) {
        toolSvg = `<i data-lucide="hourglass" class="w-12 h-12 text-sky-400"></i>`;
      } else if (currentData.id === 17) {
        toolSvg = `<i data-lucide="bell" class="w-12 h-12 text-yellow-500"></i>`;
      } else if (currentData.id === 18) {
        toolSvg = `<i data-lucide="keyboard" class="w-12 h-12 text-zinc-500"></i>`;
      } else if (currentData.id === 19) {
        toolSvg = `<i data-lucide="shrink" class="w-12 h-12 text-teal-500"></i>`;
      } else if (currentData.id === 20) {
        toolSvg = `<i data-lucide="brush-broom" class="w-14 h-14 text-orange-500"></i>`;
      }

      immersiveToolStage.innerHTML = `
        <div id="flying-tool-node" class="${slideClass} cursor-pointer p-4 bg-white dark:bg-slate-800 border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-full shadow-lg flex flex-col items-center justify-center transition-transform hover:scale-110 active:scale-95" onclick="triggerFlyAnimation()">
          ${toolSvg}
          <span class="text-[10px] font-bold font-mono text-gray-500 dark:text-gray-400 mt-1 uppercase tracking-wider">${currentData.toolName} 클릭하여 활성</span>
        </div>
      `;
      lucide.createIcons();
    }

    // 도구를 클릭했을 때의 비행 흡수 애니메이션 작동 구조
    function triggerFlyAnimation() {
      const toolNode = document.getElementById('flying-tool-node');
      const targetZone = document.getElementById('canvas-container');

      if (!toolNode || !targetZone) return;

      const nodeRect = toolNode.getBoundingClientRect();
      const zoneRect = targetZone.getBoundingClientRect();

      const deltaX = (zoneRect.left + zoneRect.width / 2) - (nodeRect.left + nodeRect.width / 2);
      const deltaY = (zoneRect.top + zoneRect.height / 2) - (nodeRect.top + nodeRect.height / 2);

      toolNode.style.setProperty('--dest-x', `${deltaX}px`);
      toolNode.style.setProperty('--dest-y', `${deltaY}px`);

      toolNode.classList.add('absorb-animation');

      // 비행 후 0.75초 후 정상 가동 상태로 전환
      setTimeout(() => {
        isToolActivatedThisStep = true;
        
        if (currentStep === 2) {
          triggerMagnetAlignment();
        } else if (currentStep === 4) {
          updateEvolution();
        } else if (currentStep === 7) {
          // 7단계 해금 시 화면 즉시 야간 다크 블루 톤으로 부드럽게 스위칭
          isDarkMode = true;
          applyDarkModeState();
          updateEvolution();
        } else {
          updateEvolution();
        }
      }, 750);
    }

    function renderCanvas() {
      if (!canvasContainer) return;

      // 0단계: 텅 빈 상태로 시작
      if (currentStep === 0) {
        canvasContainer.innerHTML = `
          <div id="initial-start-box" class="raw-box w-64 h-64 flex flex-col justify-center items-center relative transition-all duration-500">
            <span class="text-sm font-black text-gray-800 dark:text-gray-100 uppercase tracking-widest text-center" id="empty-box-text">EMPTY BOX</span>
            <span class="text-[10px] text-gray-400 mt-2 font-mono" id="empty-box-sub">Ready for Color</span>
          </div>
        `;
        return;
      }

      // 1단계: 배경테마 단일 상자 꾹 누르기 상태
      if (currentStep === 1) {
        canvasContainer.innerHTML = `
          <div id="box-1" class="raw-box w-72 h-72 flex flex-col justify-center items-center relative cursor-pointer overflow-hidden shadow-md select-none transition-all duration-500">
            <div id="hold-filler" class="absolute inset-0 bg-blue-100 dark:bg-blue-950/40 w-full origin-bottom scale-y-0 transition-transform duration-75"></div>
            
            <div id="stage-success-mark" class="absolute hidden flex-col items-center gap-1.5 z-20 text-green-500 scale-0 transition-transform duration-500">
              <i data-lucide="check-circle" class="w-14 h-14"></i>
              <span class="text-xs font-black font-mono">100% CHARGED</span>
            </div>

            <div class="z-10 flex flex-col items-center justify-center pointer-events-none text-center" id="stage-inner-wrapper">
              <i data-lucide="paint-bucket" class="w-12 h-12 text-blue-500 mb-3 animate-pulse"></i>
              <h4 class="font-bold text-gray-800 dark:text-white text-base">1. 배경 테마</h4>
              <p class="text-xs text-gray-400 dark:text-gray-500 mt-2 max-w-[200px] leading-relaxed">이 상자를 꾹~ 누르고 있으면 물감이 차오르며 배경이 변화합니다!</p>
            </div>
          </div>
        `;
        lucide.createIcons();
        bindStep1HoldEvent();
        return;
      }

      // 2단계 이상일 때 하위 렌더링에 사용되는 플래그 변수 정의
      const isGridActive = (currentStep > 4) || (currentStep === 4 && isToolActivatedThisStep);
      const isRulerActive = (currentStep > 3) || (currentStep === 3 && isToolActivatedThisStep);
      const isHoverActive = (currentStep > 8) || (currentStep === 8 && isToolActivatedThisStep);
      const isTypoActive = (currentStep > 10) || (currentStep === 10 && isToolActivatedThisStep);
      const isPaletteActive = (currentStep > 11) || (currentStep === 11 && isToolActivatedThisStep);
      const isBulbActive = (currentStep > 12) || (currentStep === 12 && isToolActivatedThisStep);
      const isTooltipActive = (currentStep > 13) || (currentStep === 13 && isToolActivatedThisStep);
      const isBlurActive = (currentStep > 14) || (currentStep === 14 && isToolActivatedThisStep);
      const isHourglassActive = (currentStep > 16) || (currentStep === 16 && isToolActivatedThisStep);
      const isAccessibilityActive = (currentStep > 18) || (currentStep === 18 && isToolActivatedThisStep);
      const isRubberActive = (currentStep > 19) || (currentStep === 19 && isToolActivatedThisStep);

      // 공통 레이아웃 뷰포트 너비 결정
      let layoutWidthClass = simulatorWidthClass;
      if (currentStep < 19) {
        layoutWidthClass = "max-w-2xl"; 
      }

      // 4단계 그리드가 켜졌거나 4단계를 지난 경우에만 2차원 grid 클래스 부여
      let gridClass = "flex flex-col"; 
      if (isGridActive) {
        gridClass = "grid-container grid grid-cols-1 md:grid-cols-2";
      }

      let innerCards = "";
      
      const cardConcepts = [
        { id: 1, title: "Typography", desc: "텍스트는 정보를 전달하는 가장 강력한 형태이자 디자인의 영혼입니다.", icon: "type" },
        { id: 2, title: "Visual Hierarchy", desc: "사용자의 시선 흐름 방향과 우선 위계를 지혜롭게 통제합니다.", icon: "layers" },
        { id: 3, title: "Proportion & Scale", desc: "요소의 상대적 면적 구조를 배치하여 신뢰 가득한 비율을 세웁니다.", icon: "maximize" },
        { id: 4, title: "Symmetry & Balance", desc: "시각적 혼동을 막는 대칭 구조와 완전한 일관성을 완성합니다.", icon: "grid" }
      ];

      cardConcepts.forEach((concept, idx) => {
        let styleAttributes = "";
        let cardClasses = "raw-box flex flex-col justify-between cursor-pointer relative transition-all duration-500 ";
        
        // 5단계 둥글기 활성화
        if (currentStep >= 5) {
          cardClasses += "sandpaper-active ";
        }
        
        // 8단계 호버 효과
        if (isHoverActive) {
          cardClasses += "hover:-translate-y-1.5 hover:scale-105 hover:z-20 ";
        }
        
        let customFontStyleFamily = selectedFontFamily;
        let customFontStyleWeight = selectedFontWeight;
        let customFontSizeClass = 'text-xs';
        let customTitleSizeClass = 'text-base';
        
        // 10단계 타이포크기 실시간 동적 적용 고정 수정
        if (isTypoActive) {
          if (selectedFontSize === 'text-sm') {
            customFontSizeClass = 'text-sm';
            customTitleSizeClass = 'text-lg';
          } else if (selectedFontSize === 'text-base') {
            customFontSizeClass = 'text-base';
            customTitleSizeClass = 'text-xl';
          }
        }

        // 12단계 전구 테두리 포커싱 빛
        if (isBulbActive && activeCardId === concept.id) {
          cardClasses += "bulb-active-border ";
        }

        // 14단계 안경 블러아웃
        if (isBlurActive) {
          cardClasses += "blur-inactive ";
        }

        // 18단계 접근성 포커스 링 (설명에 맞춰 파란색 컬러 조건 제거)
        let tabIndexStr = "";
        if (isAccessibilityActive) {
          cardClasses += "focus:outline-none focus:ring-4 focus:ring-offset-2 dark:focus:ring-offset-slate-900 focus:ring-amber-500 ";
          tabIndexStr = `tabindex="0"`;
        }

        // 20단계 빗자루 일체형 미니멀 플랫 디자인 (라이트 모드 테두리 및 그림자 강화 반영)
        if (currentStep === 20 && isToolActivatedThisStep) {
          cardClasses += "minimal-flat border-slate-300 dark:border-slate-600 ";
        }

        // 2단계 자석 정렬 완료 전 난잡한 배치 유지 (카드 너비, 높이가 흔들리지 않게 고정 규격 적용)
        if (currentStep === 2 && !step2Aligned) {
          const scatteredTransforms = [
            "transform: translate(-30px, 20px) rotate(-11deg); z-index: 10;",
            "transform: translate(25px, -15px) rotate(13deg); z-index: 10;",
            "transform: translate(-15px, -35px) rotate(-7deg); z-index: 10;",
            "transform: translate(35px, 30px) rotate(9deg); z-index: 10;"
          ];
          styleAttributes = scatteredTransforms[idx];
        }

        // 13단계 말풍선 툴팁
        let tooltipMarkup = "";
        let tooltipClass = "";
        if (isTooltipActive) {
          tooltipClass = "tooltip-trigger group";
          tooltipMarkup = `
            <div class="tooltip-balloon">
              <strong>[${concept.title}]</strong> ${stepsData[currentStep-1]?.desc || "핵심 도움말 설명이 활성화되었습니다!"}
            </div>
          `;
        }

        // 16단계 모래시계 시뮬레이터 가동
        let cardInnerContent = "";
        if (isHourglassActive && isLoadingMode) {
          cardInnerContent = `
            <div class="animate-pulse flex flex-col justify-between h-full w-full">
              <div class="flex justify-between items-center mb-4">
                <div class="rounded-full bg-slate-300 dark:bg-slate-750 h-10 w-10"></div>
                <div class="h-4 bg-slate-300 dark:bg-slate-750 rounded w-1/4"></div>
              </div>
              <div class="space-y-3">
                <div class="h-4 bg-slate-300 dark:bg-slate-750 rounded w-3/4"></div>
                <div class="h-3 bg-slate-300 dark:bg-slate-750 rounded w-full"></div>
              </div>
            </div>
          `;
        } else {
          // 11단계 브랜드 엑센트 바 표시선
          const isAccentColorActive = (currentStep > 11) || (currentStep === 11 && isToolActivatedThisStep);
          cardInnerContent = `
            ${tooltipMarkup}
            <div class="flex justify-between items-start mb-4">
              <div class="p-2 bg-blue-50 dark:bg-slate-750 text-blue-600 dark:text-sky-400 rounded-none transition-all duration-500" id="card-icon-box-${concept.id}">
                <i data-lucide="${concept.icon}" class="w-6 h-6"></i>
              </div>
              <span class="text-xs font-mono text-gray-400">0${concept.id}</span>
            </div>
            <div class="${customFontStyleFamily} ${customFontStyleWeight}">
              <h4 class="font-bold text-gray-800 dark:text-white ${customTitleSizeClass} mb-1">${concept.title}</h4>
              <p class="text-gray-500 dark:text-gray-400 leading-relaxed ${customFontSizeClass}">${concept.desc}</p>
            </div>

        let roundedRadiusStyle = `border-radius: ${cardRadii[concept.id]}px;`;

        // 7단계 야간모드 시 카드 색상도 완벽히 bg-slate-800으로 매끄럽게 변할 수 있도록 테마 클래스 바인딩 (bg-white dark:bg-slate-800)
        innerCards += `
          <div id="card-${concept.id}" 
               class="${cardClasses} ${tooltipClass} p-6 min-h-[180px] bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 shadow-sm transition-all duration-700" 
               style="${styleAttributes} ${roundedRadiusStyle}"
               ${tabIndexStr}
               onclick="onCardClick(event, ${concept.id})">
            ${cardInnerContent}
          </div>
        `;
      });

      let magnetToolbar = "";
      if (currentStep === 2) {
        if (!step2Aligned) {
          magnetToolbar = `
            <div id="magnet-panel" class="w-full max-w-2xl mb-6 bg-red-50 dark:bg-slate-900 border-2 border-red-200 dark:border-red-900 p-5 rounded-xl text-center flex flex-col items-center gap-3 z-20 shadow-sm animate-pulse">
              <div class="flex items-center gap-2 text-red-600 dark:text-red-400 font-bold text-base">
                <i data-lucide="magnet" class="w-6 h-6"></i> 2단계 말굽자석 강림 완료
              </div>
              <p class="text-xs text-red-700 dark:text-red-300 leading-relaxed">위의 자석을 클릭해 정렬을 마무리하세요.</p>
            </div>
          `;
        } else {
          magnetToolbar = `
            <div class="w-full max-w-2xl mb-6 bg-green-50 dark:bg-slate-900 border-2 border-green-200 dark:border-green-900 p-5 rounded-xl text-center flex flex-col items-center gap-3 z-20 shadow-sm">
              <div class="flex items-center gap-2 text-green-600 dark:text-green-400 font-bold text-base">
                <i data-lucide="check-circle" class="w-6 h-6"></i> 완벽한 중앙 수렴 정렬 완료!
              </div>
            </div>
          `;

      magnetObj.style.top = "60px";

        if (magnetFieldLines) magnetFieldLines.style.opacity = "1";

        const cards = document.querySelectorAll('#grid-container .raw-box');
        cards.forEach(card => {
          card.style.transition = "all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
          card.style.transform = "scale(1.04) rotate(0deg)";
          card.style.boxShadow = "0 10px 25px rgba(239, 68, 68, 0.3)"; 
        });

        setTimeout(() => {
          magnetObj.classList.remove('magnet-vibrate');
          if (magnetFieldLines) magnetFieldLines.style.opacity = "0";
          magnetObj.style.top = "-250px"; 

          setTimeout(() => {
            step2Aligned = true;
            renderCanvas();
          }, 600);
        }, 1200);

      }, 600);
    }

    function togglePopMenu(menuType) {
      if (activePopMenu === menuType) {
        activePopMenu = null;
      } else {
        activePopMenu = menuType;
      }
      renderCanvas();
    }

    function changeFontConfig(type, value) {
      if (type === 'family') selectedFontFamily = value;
      if (type === 'weight') selectedFontWeight = value;
      if (type === 'size') selectedFontSize = value;
      renderCanvas();
    }

    function toggleLoadingSimulation() {
      isLoadingMode = !isLoadingMode;
      renderCanvas();
    }

    function changeSimWidth(widthClass) {
      simulatorWidthClass = widthClass;
      renderCanvas();
    }

    // 17단계 알림 수신 배너 (토스트 피드백)
    function createToast(title) {
      if (currentStep < 17 || !toastContainer) return; 
      
      const toast = document.createElement('div');
      toast.className = "bg-slate-900 text-white dark:bg-slate-800 dark:border-slate-700 border-2 border-white px-4 py-2.5 shadow-2xl flex items-center gap-2 pointer-events-auto transition-all duration-300 opacity-0 transform translate-y-2";
      toast.style.borderRadius = "0px";
      toast.innerHTML = `
        <i data-lucide="bell" class="w-4 h-4 text-yellow-400 animate-bounce"></i>
        <span class="text-xs font-bold font-mono">${title} 알림 피드백 전송 완료!</span>
      `;
      
      toastContainer.appendChild(toast);
      lucide.createIcons();

      setTimeout(() => {
        toast.classList.remove('opacity-0', 'translate-y-2');
      }, 50);

      setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y--2');
        setTimeout(() => { toast.remove(); }, 300);
      }, 2400);
    }

    function advanceStep(expectedStep) {
      if (currentStep === expectedStep && currentStep < maxSteps) {
        currentStep++;
        isToolActivatedThisStep = false; 
        updateEvolution();
        
        if (currentStep === 13) {
          showInfoModal(
            "13단계: 설명 & 툴팁 (Speech Bubble)",
            "축하합니다! 이제 요소들의 깊이 있는 비하인드 시각 구조론을 감상할 수 있는 '도움말 말풍선'이 부착되었습니다. 각 카드 위에 마우스를 호버링시켜 가이드 창을 사색해 보세요.",
            13
          );
        }
      }
    }

    function changePointColor(color) {
      selectedColor = color;
      document.documentElement.style.setProperty('--primary-color', color);
      renderCanvas();
    }

    function initAdvancedInteractions() {
      if (currentStep < 2) return;

      const cards = document.querySelectorAll('#grid-container .raw-box');

      // 3단계 줄자: 세로 배치 상태에서도 상하 마진(Margin)을 주어 직접 작동되게 고도화
      if (currentStep >= 3) {
        const gapSlider = document.getElementById('ruler-gap');
        const rulerValues = document.getElementById('ruler-values');

        const updateSpacing = () => {
          if (!gapSlider) return;
          rulerGapVal = parseInt(gapSlider.value);
          
          if (currentStep >= 4) {
            document.documentElement.style.setProperty('--card-gap', `${rulerGapVal}px`);
            document.documentElement.style.setProperty('--card-margin', '0px');
            cards.forEach(c => { c.style.marginBottom = '0px'; });
          } else {
            // 4단계 그리드 도입 전 1차원 가로세로 간격 반영 보완 (3단계에서도 완벽 작동 보장)
            document.documentElement.style.setProperty('--card-gap', '16px');
            cards.forEach((c, idx) => {
              if (idx < cards.length - 1) {
                c.style.marginBottom = `${rulerGapVal}px`;
              }
            });
          }

          if (rulerValues) {
            rulerValues.textContent = `간격: ${rulerGapVal}px`;
          }
        };

        if (gapSlider) {
          gapSlider.addEventListener('input', updateSpacing);
          updateSpacing(); 
        }
      }

      // 5단계 톱: 모서리가 갈려 둥글어지는 속도를 대폭 상향 (Rapid Rounded Corners)
      if (currentStep === 5) {
        cards.forEach((card, idx) => {
          let sandInterval = null;
          const cardId = idx + 1;

          card.addEventListener('mouseenter', () => {
            if (sandInterval) clearInterval(sandInterval);
            sandInterval = setInterval(() => {
              if (cardRadii[cardId] < 12) { 
                cardRadii[cardId] += 3; // 깎임 가속도 대폭 상향
                if (cardRadii[cardId] > 12) cardRadii[cardId] = 12;
                card.style.borderRadius = `${cardRadii[cardId]}px`;
              } else {
                clearInterval(sandInterval);
              }
            }, 10);
          });

          card.addEventListener('mouseleave', () => {
            if (sandInterval) {
              clearInterval(sandInterval);
              sandInterval = null;
            }
          });
        });
      }

      // 6단계 태양 / 20단계 빗자루: 마우스의 매 미세 움직임마다 그림자가 부드러우면서도 실시간으로 즉시 따라붙음
      if ((currentStep >= 6 && currentStep < 20) || (currentStep === 20 && isToolActivatedThisStep)) {
        document.addEventListener('mousemove', handleSunShadowRealtime);
      } else {
        document.removeEventListener('mousemove', handleSunShadowRealtime);
      }

      function handleSunShadowRealtime(e) {
        if (currentStep === 2 && !step2Aligned) return;
        
        cards.forEach(card => {
          const rect = card.getBoundingClientRect();
          const cardCenterX = rect.left + rect.width / 2;
          const cardCenterY = rect.top + rect.height / 2;

          const deltaX = cardCenterX - e.clientX;
          const deltaY = cardCenterY - e.clientY;

          const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
          const maxShadowDistance = 15;
          
          const shadowX = (deltaX / distance) * Math.min(distance * 0.05, maxShadowDistance);
          const shadowY = (deltaY / distance) * Math.min(distance * 0.05, maxShadowDistance);

          const blur = Math.min(distance * 0.03, 16) + 4;
          const opacity = Math.min(0.18, 0.04 + (distance * 0.0001));

          // 실시간 마우스 트래킹을 주어 지연 없는 입체 그림자 반응성 보증
          card.style.transition = "transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2)";
          card.style.boxShadow = `${shadowX}px ${shadowY}px ${blur}px rgba(0, 0, 0, ${opacity})`;
        });
      }

      // 14단계 안경: 평상시 맑게 유지, 마우스 올릴 때만 안 올린 카드를 블러 처리함
      if (currentStep >= 14 && currentStep < 20) {
        document.documentElement.style.setProperty('--blur-amount', '5px');
        cards.forEach(card => {
          card.classList.remove('blur-inactive', 'blur-active'); 
          card.addEventListener('mouseenter', () => {
            cards.forEach(c => {
              if (c !== card) {
                c.classList.add('blur-inactive');
                c.classList.remove('blur-active');
              } else {
                c.classList.add('blur-active');
                c.classList.remove('blur-inactive');
              }
            });
          });

          card.addEventListener('mouseleave', () => {
            cards.forEach(c => {
              c.classList.remove('blur-inactive', 'blur-active');
            });
          });
        });
      } else {
        document.documentElement.style.setProperty('--blur-amount', '0px');
        cards.forEach(c => {
          c.classList.remove('blur-inactive', 'blur-active');
        });
      }

      if (currentStep >= 13) {
        cards.forEach(card => {
          card.addEventListener('mouseenter', () => card.classList.add('tooltip-active'));
          card.addEventListener('mouseleave', () => card.classList.remove('tooltip-active'));
        });
      }
    }

    function onCardClick(e, cardId) {
      if (e.target.closest('input') || e.target.closest('select') || e.target.closest('button')) return;

      const card = document.getElementById(`card-${cardId}`);
      if (!card) return;

      if (currentStep >= 12) {
        activeCardId = cardId;
        document.querySelectorAll('#grid-container .raw-box').forEach(c => {
          c.classList.remove('bulb-active-border');
        });
        card.classList.add('bulb-active-border');
      }

      if (currentStep >= 17) {
        createToast(`Card 0${cardId}`);
      }

      // 9단계 스프링: 극도로 부드럽고 쫀득쫀득한 이징 텐션 적용
      if (currentStep >= 9) {
        card.style.transform = "scale(0.88) translateY(4px)";
        card.style.transition = "transform 0.1s cubic-bezier(0.25, 1, 0.5, 1)";
        
        setTimeout(() => {
          card.style.transform = "scale(1.05) translateY(-3px)";
          card.style.transition = "transform 0.14s cubic-bezier(0.175, 0.885, 0.32, 1.4)";
          
          setTimeout(() => {
            card.style.transform = "";
            card.style.transition = "transform 0.25s ease"; 
            fireCardContentOutput(cardId);
          }, 140);
        }, 100);
      } else {
        fireCardContentOutput(cardId);
      }
    }

    function fireCardContentOutput(cardId) {
      const stepDetail = stepsData[currentStep - 1];
      const descText = stepsData[currentStep - 1]?.desc || "클릭 반동 피드백이 완벽히 가동되었습니다!";

      // 15단계 사이드 슬라이더 커튼 활성화
      if (currentStep >= 15 && curtainTitle && curtainBody && curtainOverlay) {
        curtainTitle.textContent = `${currentStep}단계: ${stepDetail.title}`;
        curtainBody.innerHTML = `
          <div class="space-y-4">
            <p class="font-bold text-gray-800 dark:text-white text-base">선택된 타겟: Card 0${cardId}</p>
            <div class="p-3 bg-blue-50 dark:bg-slate-750 border-l-4 border-blue-500 font-mono text-xs text-blue-800 dark:text-blue-200 rounded">
              "사이드 레이어로 정보를 호출하여 화면 전환 비용을 극단적으로 단축시킵니다."
            </div>
            <p class="text-xs text-gray-600 dark:text-gray-300 leading-relaxed">${descText}</p>
          </div>
        `;
        curtainOverlay.classList.remove('translate-x-full');
      } else {
        showInfoModal(
          `${currentStep}단계: ${stepDetail?.title || "상호작용"}`,
          descText,
          currentStep
        );
      }
    }

    function showInfoModal(title, desc, stepNum) {
      if (!modalTitle || !modalDesc || !modalMeta || !infoModal || !infoModalContent) return;
      modalTitle.innerHTML = `<i data-lucide="${stepsData[stepNum-1]?.icon || 'info'}" class="text-blue-600 w-6 h-6 inline-block mr-2"></i> ${title}`;
      modalDesc.textContent = desc;
      modalMeta.textContent = `현재 활성화 단계: Step ${stepNum} / 20`;

      infoModal.classList.remove('opacity-0', 'pointer-events-none');
      infoModalContent.classList.remove('scale-95');
      infoModalContent.classList.add('scale-100');

      lucide.createIcons();
    }

    function closeModal() {
      if (!infoModal || !infoModalContent) return;
      infoModal.classList.add('opacity-0', 'pointer-events-none');
      infoModalContent.classList.add('scale-95');
      infoModalContent.classList.remove('scale-100');
    }

    function triggerFullReset() {
      currentStep = 0;
      selectedColor = '#3b82f6';
      step2Aligned = false;
      timelineUnlocked = false; 
      isToolActivatedThisStep = false;
      rulerGapVal = 16;
      cardRadii = { 1: 0, 2: 0, 3: 0, 4: 0 }; 
      selectedFontFamily = 'font-sans';
      selectedFontWeight = 'font-normal';
      selectedFontSize = 'text-xs';
      activeCardId = null;
      isLoadingMode = false;
      simulatorWidthClass = 'max-w-2xl';
      activePopMenu = null;

      if (curtainOverlay) curtainOverlay.classList.add('translate-x-full');
      if (toastContainer) toastContainer.innerHTML = "";
      if (immersiveToolStage) immersiveToolStage.innerHTML = "";
      
      isDarkMode = false;
      lightThemeBackground = '#ffffff';
      applyDarkModeState();
      if (nightToggleBtn) nightToggleBtn.classList.add('hidden');

      document.documentElement.style.setProperty('--bg-color', '#ffffff');
      document.body.style.backgroundColor = '#ffffff';
      document.documentElement.style.setProperty('--primary-color', '#3b82f6');
      document.documentElement.style.setProperty('--card-gap', '16px');
      
      if (siteLogo) {
        siteLogo.textContent = "Raw Canvas";
        siteLogo.className = "text-xl md:text-2xl font-black tracking-wider uppercase";
      }
      if (mainHeader) {
        mainHeader.className = "w-full max-w-5xl mx-auto z-10 flex justify-between items-center py-4 border-b-2 border-black transition-all duration-700";
      }
      
      if (guideTitle && guideDesc) {
        guideTitle.textContent = "완전히 비어 있는 원시 상태입니다.";
        guideTitle.className = "text-lg font-bold text-gray-800";
        guideDesc.textContent = "무언가 일어날 때까지 잠시 기다리거나 상자를 지켜보세요...";
      }
      
      if (badgeStep) badgeStep.textContent = "Step 0 / 20";
      if (progressPercent) progressPercent.textContent = "0% Evolution";

      if (timelineContainer) {
        timelineContainer.classList.add('hidden-initially');
        timelineContainer.classList.remove('visible-step');
      }
      if (timelineUnlockTag) timelineUnlockTag.classList.add('hidden');
      if (resetBtn) resetBtn.classList.add('hidden');

      if (paintBucketTool) {
        paintBucketTool.style.display = 'flex';
        paintBucketTool.className = "paint-bucket-sliding bg-blue-600 text-white p-4 rounded-full shadow-2xl flex items-center justify-center border-2 border-white hover:scale-110 active:scale-95 transition-transform";
        setTimeout(() => { paintBucketTool.classList.add('active'); }, 150);
      }

      renderCanvas();
      renderTimelineLabels();
      lucide.createIcons();
    }
  </script>
</body>
